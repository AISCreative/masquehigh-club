    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0c14; }
    body { background: radial-gradient(circle at 30% 30%, #1a2a3a 0%, #030408 100%); display: flex; justify-content: center; align-items: center; padding: 8px; position: relative; }
    body::before { content: "MASQUEHIGH CLUB"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; color: rgba(255, 24, 208, 0.08); white-space: nowrap; letter-spacing: 12px; text-transform: uppercase; pointer-events: none; z-index: 1; animation: floatLogo 20s infinite alternate ease-in-out; }
    @keyframes floatLogo { 0% { transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); opacity: 0.08; } 100% { transform: translate(-48%, -52%) rotate(-8deg) scale(1.25); opacity: 0.12; } }
    .kiosco { width: 100%; max-width: 1280px; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border: 2px solid #00ff9f; border-radius: 30px; box-shadow: 0 0 40px #00ff9f66; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }

    .logo-masquehigh { font-size: 4.8rem; font-weight: 900; color: #00ff9f; text-shadow: 0 0 25px #00ff9f; line-height: 1.1; }
    .logo-club { font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; color: #ff44e0; margin-top: -0.5rem; }
    .welcome { font-size: 1.6rem; color: #ffffff; background: linear-gradient(90deg, transparent, rgba(255, 24, 208, 0.2), transparent); padding: 0.3rem 1rem; border-radius: 40px; display: inline-block; }
    
    /* Pestañas principales */
    .pestanas { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.4rem; padding: 0.8rem 1rem; }
    .pestana { background: rgba(10, 10, 20, 0.9); border: 2px solid; border-radius: 12px; padding: 0.5rem 0.1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
    .pestana.extracciones { border-color: #00ff9f; color: #00ff9f; }
    .pestana.hierbas { border-color: #7cfc00; color: #7cfc00; }
    .pestana.hash { border-color: #b87333; color: #b87333; }
    .pestana.liados { border-color: #ffaa00; color: #ffaa00; }
    .pestana.munchies { border-color: #ff18d0; color: #ff18d0; }
    .pestana.eventos { border-color: #ffff00; color: #ffff00; }
    .pestana.activa { transform: scale(1.02); box-shadow: 0 0 20px currentColor; border-width: 3px; background: rgba(30, 30, 40, 0.95); }
    .pestana-icon { font-size: 2rem; }
    .pestana-text { font-size: 1.1rem; font-weight: 700; }
    
    .contenido { flex: 1; overflow-y: auto; padding: 1rem 1rem; }
    .panel { display: none; }
    .panel.activo { display: block; }
    
    .subseccion { background: rgba(0, 0, 0, 0.5); border: 1px solid #ff18d0; border-radius: 20px; padding: 1rem; margin-bottom: 1.2rem; }
    .subseccion-titulo { font-size: 2rem; color: #ff18d0; text-shadow: 0 0 10px #ff18d0; margin-bottom: 1rem; padding-left: 0.8rem; border-left: 6px solid #00ff9f; }
    
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
    .producto-card { background: #0d0f1a; border: 2px solid #3a2b4a; border-radius: 18px; padding: 0.8rem 0.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .producto-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #00ff9f; box-shadow: 0 0 0 2px #ff18d0; margin-bottom: 0.5rem; }
    .producto-card h4 { font-size: 1.2rem; color: white; text-shadow: 0 0 5px #00ff9f; margin-bottom: 0.25rem; }
    .producto-precio { font-size: 1.3rem; font-weight: 800; color: #00ff9f; background: rgba(255, 24, 208, 0.2); padding: 0.2rem 1rem; border-radius: 30px; border: 1px solid #ff18d0; display: inline-block; }
    
    .liados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.2rem; }
    .liado-card { background: linear-gradient(145deg, #1a1a2a, #0d0f1a); border: 3px solid #ffaa00; border-radius: 20px; padding: 1.2rem 0.8rem; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 0 15px rgba(255, 170, 0, 0.3); }

    .liado-card h4 { font-size: 1.5rem; color: #ffaa00; text-shadow: 0 0 10px #ffaa00; margin-bottom: 0.5rem; }
    .liado-precio { font-size: 1.4rem; font-weight: 800; color: white; background: rgba(255, 170, 0, 0.3); padding: 0.3rem 1.2rem; border-radius: 30px; border: 2px solid #ffaa00; display: inline-block; }
    
    .munchies-categoria { background: rgba(20, 5, 25, 0.7); border: 2px solid #ff18d0; border-radius: 30px; padding: 1.5rem 1.2rem; margin-bottom: 1.5rem; }
    .categoria-titulo { font-size: 2.6rem; color: #ff18d0; text-shadow: 0 0 15px #ff18d0; margin-bottom: 1.5rem; border-bottom: 3px dotted #00ff9f; padding-bottom: 0.5rem; display: inline-block; }
    .items-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; }
    .item-munchi { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.6); padding: 0.8rem 1.2rem; border-radius: 60px; border: 1px solid #00ff9f; }
    .item-nombre { font-size: 1.4rem; color: white; text-transform: uppercase; }
    .item-precio { font-size: 1.5rem; font-weight: 800; color: #00ff9f; }
    
    /* Eventos: 4 imágenes en 2 columnas */
    .eventos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; padding: 0.5rem; }
    .evento-card { background: transparent; border: 3px solid #ffff00; border-radius: 20px; overflow: hidden; aspect-ratio: 1/1.2; position: relative; }
    .evento-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .evento-delete { position: absolute; top: 5px; right: 5px; background: #ff18d0; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 20px; cursor: pointer; display: none; z-index: 100; }
    .admin-mode .evento-delete { display: block; }

    .btn-upload { background: #00ff9f; }

    // ===== FUNCIÓN PARA COMPRIMIR IMÁGENES =====
    function comprimirImagen(dataUrl, calidad = 0.7, maxAncho = 600) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let ancho = img.width;
          let alto = img.height;
          
          if (ancho > maxAncho) {
            alto = (maxAncho / ancho) * alto;
            ancho = maxAncho;
          }
          
          canvas.width = ancho;
          canvas.height = alto;
          
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, ancho, alto);
          
          const dataUrlComprimida = canvas.toDataURL('image/jpeg', calidad);
          resolve(dataUrlComprimida);
        };
        img.src = dataUrl;
      });
    }

    // ===== FUNCIONES PARA GUARDAR Y CARGAR =====
    function guardarDatos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(datosActuales));
    }

    function cargarDatos() {
      const guardado = localStorage.getItem(STORAGE_KEY);
      
      if (guardado) {
        try {
          datosActuales = JSON.parse(guardado);
          // Asegurar que todas las secciones existen
          datosActuales.extracciones = datosActuales.extracciones || DATOS_POR_DEFECTO.extracciones;
          datosActuales.hierbas = datosActuales.hierbas || DATOS_POR_DEFECTO.hierbas;
          datosActuales.hash = datosActuales.hash || DATOS_POR_DEFECTO.hash;
          datosActuales.liados = datosActuales.liados || DATOS_POR_DEFECTO.liados;
          datosActuales.refrescos = datosActuales.refrescos || DATOS_POR_DEFECTO.refrescos;
          datosActuales.picar = datosActuales.picar || DATOS_POR_DEFECTO.picar;
          datosActuales.eventos = datosActuales.eventos || DATOS_POR_DEFECTO.eventos;
        } catch (e) {
          console.error('Error al cargar datos, usando por defecto:', e);
          datosActuales = JSON.parse(JSON.stringify(DATOS_POR_DEFECTO));
        }
      } else {
        datosActuales = JSON.parse(JSON.stringify(DATOS_POR_DEFECTO));
      }
      
      // Renderizar todas las secciones
      renderizarTodo();
    }

    function renderizarTodo() {
      renderizarExtracciones();
      renderizarHierbas();
      renderizarHash();
      renderizarLiados();
      renderizarRefrescos();
      renderizarPicar();
      renderizarEventos();
    }

    // ===== FUNCIONES DE RENDERIZADO =====
    function renderizarExtracciones() {
      const grid = document.getElementById('extracciones-grid');
      grid.innerHTML = '';
      datosActuales.extracciones.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'producto-card';
        div.innerHTML = `
          <img src="${item.img}" id="extracciones-img-${i}">
          <h4 id="extracciones-nombre-${i}">${item.nombre}</h4>
          <div class="producto-precio" id="extracciones-precio-${i}">${item.precio}</div>
        `;
        grid.appendChild(div);
      });
    }

    function renderizarHierbas() {
      const grid = document.getElementById('hierbas-grid');
      grid.innerHTML = '';
      datosActuales.hierbas.forEach((item, i) => {
        const div = document.createElement('div');

        div.innerHTML = `
          <img src="${item.img}" id="hierbas-img-${i}">
          <h4 id="hierbas-nombre-${i}">${item.nombre}</h4>
          <div class="producto-precio" id="hierbas-precio-${i}">${item.precio}</div>
        `;
        grid.appendChild(div);
      });
    }

      const lista = document.getElementById('picar-lista');

    function renderizarEventos() {

      grid.innerHTML = '';
      datosActuales.eventos.forEach((img, i) => {

        div.className = 'evento-card';
        div.innerHTML = `
          <img src="${img}" id="evento-img-${i}">
          <button class="evento-delete" onclick="eliminarEvento(${i})" style="display: ${document.getElementById('panel-admin')?.style.display === 'block' ? 'block' : 'none'}">✖</button>
        `;
        grid.appendChild(div);
      });

    // ===== FUNCIÓN PARA OBTENER DATOS ACTUALES (desde el DOM) =====
    function sincronizarDatosDesdeDOM() {
      // Extracciones
      const extraccionesCards = document.querySelectorAll('#extracciones-grid .producto-card');
      if (extraccionesCards.length > 0) {
        datosActuales.extracciones = Array.from(extraccionesCards).map(card => ({
          img: card.querySelector('img').src,
          nombre: card.querySelector('h4').textContent,
          precio: card.querySelector('.producto-precio').textContent
        }));
      }

      // Hierbas
      const hierbasCards = document.querySelectorAll('#hierbas-grid .producto-card');
      if (hierbasCards.length > 0) {
        datosActuales.hierbas = Array.from(hierbasCards).map(card => ({
          img: card.querySelector('img').src,
          nombre: card.querySelector('h4').textContent,
          precio: card.querySelector('.producto-precio').textContent
        }));
      }

      // Hash
      const hashCards = document.querySelectorAll('#hash-grid .producto-card');
      if (hashCards.length > 0) {
        datosActuales.hash = Array.from(hashCards).map(card => ({
          img: card.querySelector('img').src,
          nombre: card.querySelector('h4').textContent,
          precio: card.querySelector('.producto-precio').textContent
        }));
      }

      // Liados
      const liadosCards = document.querySelectorAll('#liados-grid .liado-card');
      if (liadosCards.length > 0) {
        datosActuales.liados = Array.from(liadosCards).map(card => ({
          nombre: card.querySelector('h4').textContent,
          precio: card.querySelector('.liado-precio').textContent
        }));
      }

      // Refrescos
      const refrescosItems = document.querySelectorAll('#refrescos-lista .item-munchi');
      if (refrescosItems.length > 0) {
        datosActuales.refrescos = Array.from(refrescosItems).map(item => ({
          nombre: item.querySelector('.item-nombre').textContent,
          precio: item.querySelector('.item-precio').textContent
        }));
      }

      // Picar
      const picarItems = document.querySelectorAll('#picar-lista .item-munchi');
      if (picarItems.length > 0) {
        datosActuales.picar = Array.from(picarItems).map(item => ({
          nombre: item.querySelector('.item-nombre').textContent,
          precio: item.querySelector('.item-precio').textContent
        }));
      }

      // Eventos
      const eventosImgs = document.querySelectorAll('#eventos-grid img');
      if (eventosImgs.length > 0) {
        datosActuales.eventos = Array.from(eventosImgs).map(img => img.src);
      }
    }

    // ===== MOSTRAR SECCIONES PARA EDITAR =====

      }
      
      else if (seccion === 'hash') {
        html = '<h3 style="color: #b87333; margin-bottom: 20px;">🟫 HASH</h3><div class="admin-grid">';
        datosActuales.hash.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #b87333;">

              <input type="text" id="liados-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" style="border-color:#ffaa00; color:#ffaa00;" onchange="actualizarCampo('liados', 'precio', ${i}, this.value)">
              <button onclick="eliminarProducto('liados', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>

          `;

        html += '</div><button onclick="anadirProducto(\'liados\')" style="width:100%; background:#ffaa00; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR LIADO</button>';
      }
      
      else if (seccion === 'refrescos') {
        html = '<h3 style="color: #ff18d0; margin-bottom: 20px;">🥤 BEBIDAS</h3><div class="admin-grid">';
        datosActuales.refrescos.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #ff18d0;">
              <input type="text" id="refresco-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarCampo('refrescos', 'nombre', ${i}, this.value)">
              <input type="text" id="refresco-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarCampo('refrescos', 'precio', ${i}, this.value)">

            </div>

      else if (seccion === 'eventos') {
        html = '<h3 style="color: #ffff00; margin-bottom: 20px;">🎉 EVENTOS</h3><div class="admin-grid">';
        datosActuales.eventos.forEach((img, i) => {
          html += `
            <div class="admin-card" style="border-color: #ffff00;">
              <img src="${img}" id="evento-img-admin-${i}" class="admin-img">
              <input type="file" id="evento-file-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenEvento(${i})">
              <button onclick="document.getElementById('evento-file-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO ${i+1}</button>
              <button onclick="eliminarEvento(${i})" class="admin-btn btn-delete">🗑️ ELIMINAR CARTEL</button>

    // ===== FUNCIONES PARA ACTUALIZAR CAMPOS =====
    function actualizarCampo(tipo, campo, index, valor) {
      // Actualizar en datosActuales
      if (campo === 'nombre') {
        datosActuales[tipo][index].nombre = valor;
        // Actualizar en el DOM
        const elemento = document.getElementById(`${tipo}-nombre-${index}`);
        if (elemento) elemento.textContent = valor;
      } else if (campo === 'precio') {
        datosActuales[tipo][index].precio = valor;
        // Actualizar en el DOM
        const elemento = document.getElementById(`${tipo}-precio-${index}`);
        if (elemento) elemento.textContent = valor;
      }
      
      guardarDatos();
      mostrarIndicator();
    }

    // ===== FUNCIONES PARA SUBIR IMÁGENES =====
    async function subirImagen(tipo, index) {
      const input = document.getElementById(`${tipo}-file-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          
          // Actualizar imagen en admin
          document.getElementById(`${tipo}-img-admin-${index}`).src = imgComprimida;
          
          // Actualizar imagen principal
          const imgPrincipal = document.getElementById(`${tipo}-img-${index}`);
          if (imgPrincipal) imgPrincipal.src = imgComprimida;
          
          // Actualizar en datosActuales
          datosActuales[tipo][index].img = imgComprimida;
          
          guardarDatos();
          mostrarIndicator();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function subirImagenEvento(index) {
      const input = document.getElementById(`evento-file-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          
          // Actualizar imagen en admin
          document.getElementById(`evento-img-admin-${index}`).src = imgComprimida;
          
          // Actualizar imagen principal
          const imgPrincipal = document.getElementById(`evento-img-${index}`);
          if (imgPrincipal) imgPrincipal.src = imgComprimida;
          
          // Actualizar en datosActuales
          datosActuales.eventos[index] = imgComprimida;
          
          guardarDatos();
          mostrarIndicator();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // ===== FUNCIONES PARA EVENTOS (CARTELES) =====
    function anadirEvento() {
      datosActuales.eventos.push('images/placeholder.jpg');
      renderizarEventos();
      guardarDatos();
      mostrarSeccion('eventos');
      mostrarIndicator();
    }

    function eliminarEvento(index) {
      if (!confirm('¿Eliminar este cartel?')) return;
      
      datosActuales.eventos.splice(index, 1);
      renderizarEventos();
      guardarDatos();
      mostrarSeccion('eventos');
      mostrarIndicator();
    }

    // ===== FUNCIONES PARA AÑADIR/ELIMINAR PRODUCTOS =====
    function anadirProducto(tipo) {
      switch(tipo) {
        case 'extracciones':
          datosActuales.extracciones.push({ img: 'images/placeholder.jpg', nombre: 'NUEVA EXTRACCIÓN', precio: '0€' });
          renderizarExtracciones();
          break;
        case 'hierbas':
          datosActuales.hierbas.push({ img: 'images/placeholder.jpg', nombre: 'NUEVA HIERBA', precio: '0€' });
          renderizarHierbas();
          break;
        case 'hash':
          datosActuales.hash.push({ img: 'images/placeholder.jpg', nombre: 'NUEVO HASH', precio: '0€' });
          renderizarHash();
          break;
        case 'liados':
          datosActuales.liados.push({ nombre: 'NUEVO LIADO', precio: '0€' });
          renderizarLiados();
          break;
        case 'refrescos':
          datosActuales.refrescos.push({ nombre: 'NUEVA BEBIDA', precio: '0€' });
          renderizarRefrescos();
          break;
        case 'picar':
          datosActuales.picar.push({ nombre: 'NUEVO PRODUCTO', precio: '0€' });
          renderizarPicar();
          break;
      }
      
      guardarDatos();
      mostrarSeccion(tipo);
      mostrarIndicator();
    }

    function eliminarProducto(tipo, index) {
      if (!confirm('¿Eliminar este producto?')) return;
      
      datosActuales[tipo].splice(index, 1);
      
      switch(tipo) {
        case 'extracciones':
          renderizarExtracciones();
          break;
        case 'hierbas':
          renderizarHierbas();
          break;
        case 'hash':
          renderizarHash();
          break;
        case 'liados':
          renderizarLiados();
          break;
        case 'refrescos':
          renderizarRefrescos();
          break;
        case 'picar':
          renderizarPicar();
          break;
      }
      
      guardarDatos();
      mostrarSeccion(tipo);
      mostrarIndicator();
    }

    // ===== GUARDAR TODO =====
    function guardarTodo() {
      sincronizarDatosDesdeDOM();
      guardarDatos();
      mostrarIndicator();
    }

    function mostrarIndicator() {
      const indicator = document.getElementById('saveIndicator');
      indicator.style.display = 'block';
      setTimeout(() => indicator.style.display = 'none', 2000);
    }

    // Mostrar botones de eliminar en eventos cuando el admin está abierto
    function actualizarVisibilidadBotonesEventos() {
      const adminAbierto = document.getElementById('panel-admin').style.display === 'block';
      document.querySelectorAll('.evento-delete').forEach(btn => {
        btn.style.display = adminAbierto ? 'block' : 'none';
      });
    }

    // Observar cambios en el panel admin
    const observer = new MutationObserver(actualizarVisibilidadBotonesEventos);
    observer.observe(document.getElementById('panel-admin'), { attributes: true, attributeFilter: ['style'] });

    // Inicializar
    window.addEventListener('load', cargarDatos);
  </script>
