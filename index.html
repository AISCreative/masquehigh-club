<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <title>MASQUEHIGH CLUB · EXPERIENCE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
    
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05050a; }
    
    /* Fondo con efecto de onda y partículas */
    body { 
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 25%, #0a0a2e 50%, #1a0a1a 75%, #0a0a1a 100%);
      background-size: 400% 400%;
      animation: bgFlow 15s ease infinite;
      display: flex; 
      justify-content: center; 
      align-items: center; 
      padding: 15px; 
      position: relative;
      overflow: hidden;
    }
    
    @keyframes bgFlow {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 50% 100%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 0%; }
    }
    
    /* Partículas flotantes */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,45,117,0.4), transparent);
      pointer-events: none;
      animation: floatParticle linear infinite;
      z-index: 0;
    }
    
    @keyframes floatParticle {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(90deg, rgba(255,45,117,0.03) 0px, rgba(255,45,117,0.03) 2px, transparent 2px, transparent 50px),
        repeating-linear-gradient(0deg, rgba(0,229,255,0.03) 0px, rgba(0,229,255,0.03) 2px, transparent 2px, transparent 50px);
      pointer-events: none;
      z-index: 0;
    }
    
    body::after {
      content: "✦ MASQUEHIGH ✦";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-5deg);
      font-size: clamp(5rem, 20vw, 14rem);
      font-weight: 900;
      color: rgba(255,45,117,0.03);
      white-space: nowrap;
      letter-spacing: 25px;
      pointer-events: none;
      z-index: 0;
      font-family: 'Poppins', sans-serif;
      text-shadow: 0 0 50px rgba(255,45,117,0.1);
      animation: textFloat 10s ease-in-out infinite alternate;
    }
    
    @keyframes textFloat {
      0%, 100% { transform: translate(-50%, -50%) rotate(-5deg) scale(1); opacity: 0.03; }
      50% { transform: translate(-48%, -52%) rotate(-3deg) scale(1.02); opacity: 0.06; }
    }
    
    /* Kiosco principal - Ultra Glassmorphism */
    .kiosco { 
      width: 100%; 
      max-width: 1450px; 
      height: 100%; 
      background: rgba(8, 8, 20, 0.45);
      backdrop-filter: blur(25px);
      border-radius: 56px;
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      position: relative; 
      z-index: 10;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transition: all 0.5s ease;
    }
    
    /* Borde neón con glow animado */
    .kiosco::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 56px;
      padding: 2px;
      background: linear-gradient(135deg, 
        #ff2d75, #ff2d75, #00e5ff, #00e5ff, 
        #ffea00, #ffea00, #00ffaa, #00ffaa, 
        #b800ff, #b800ff, #ff2d75);
      background-size: 300% 300%;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      pointer-events: none;
      animation: borderWave 4s ease infinite;
    }
    
    @keyframes borderWave {
      0%, 100% { background-position: 0% 50%; opacity: 0.7; }
      50% { background-position: 100% 50%; opacity: 1; }
    }
    
    /* Efecto de brillo interno */
    .kiosco::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
      pointer-events: none;
      animation: shimmer 8s linear infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translate(-20%, -20%) rotate(0deg); }
      100% { transform: translate(20%, 20%) rotate(360deg); }
    }
    
    /* Header con efecto holográfico */
    .header { 
      padding: 2rem 2rem 1rem; 
      text-align: center; 
      position: relative;
      background: linear-gradient(180deg, rgba(255,45,117,0.15) 0%, transparent 80%);
    }
    
    .logo-masquehigh { 
      font-size: 5.5rem; 
      font-weight: 900; 
      background: linear-gradient(135deg, #ff2d75, #ffea00, #00e5ff, #ff2d75);
      background-size: 300% 300%;
      -webkit-background-clip: text; 
      background-clip: text; 
      color: transparent; 
      line-height: 1;
      letter-spacing: -2px;
      animation: hologram 3s ease infinite;
      text-shadow: 0 0 30px rgba(255,45,117,0.3);
    }
    
    @keyframes hologram {
      0%, 100% { background-position: 0% 50%; filter: hue-rotate(0deg); }
      50% { background-position: 100% 50%; filter: hue-rotate(15deg); }
    }
    
    .logo-club { 
      font-size: 4rem; 
      font-weight: 800; 
      letter-spacing: 18px; 
      background: linear-gradient(135deg, #ffea00, #ff2d75, #00e5ff);
      -webkit-background-clip: text; 
      background-clip: text; 
      color: transparent; 
      margin-top: -0.8rem;
      animation: clubGlow 4s ease infinite;
    }
    
    @keyframes clubGlow {
      0%, 100% { filter: drop-shadow(0 0 5px rgba(255,234,0,0.3)); }
      50% { filter: drop-shadow(0 0 20px rgba(255,45,117,0.5)); }
    }
    
    .welcome { 
      font-size: 1.3rem; 
      background: linear-gradient(135deg, rgba(255,45,117,0.2), rgba(0,229,255,0.2));
      backdrop-filter: blur(10px);
      padding: 0.6rem 2rem; 
      border-radius: 60px; 
      display: inline-block; 
      border: 1px solid rgba(255,45,117,0.5);
      font-weight: 500;
      letter-spacing: 1px;
      animation: welcomePulse 2s ease-in-out infinite alternate;
    }
    
    @keyframes welcomePulse {
      from { box-shadow: 0 0 10px rgba(255,45,117,0.3); border-color: rgba(255,45,117,0.3); }
      to { box-shadow: 0 0 25px rgba(255,45,117,0.6); border-color: rgba(255,45,117,0.8); }
    }
    
    /* Pestañas - diseño futurista */
    .pestanas-wrapper {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 1.2rem 1.8rem;
      scrollbar-width: thin;
    }
    
    .pestanas { 
      display: flex; 
      gap: 1rem; 
      min-width: max-content; 
    }
    
    .pestana { 
      background: rgba(15, 15, 35, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,45,117,0.3);
      border-radius: 60px; 
      padding: 0.9rem 2rem; 
      display: flex; 
      align-items: center; 
      gap: 12px;
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      position: relative;
      overflow: hidden;
    }
    
    .pestana::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(255,45,117,0.4), transparent);
      transition: width 0.4s, height 0.4s;
      transform: translate(-50%, -50%);
      border-radius: 50%;
    }
    
    .pestana:hover::before {
      width: 200px;
      height: 200px;
    }
    
    .pestana-icon { font-size: 1.5rem; position: relative; z-index: 1; transition: transform 0.3s ease; }
    .pestana-text { font-size: 1.1rem; font-weight: 600; position: relative; z-index: 1; background: linear-gradient(135deg, #fff, #ffccdd); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    .pestana:hover { transform: translateY(-4px); border-color: #ff2d75; background: rgba(255,45,117,0.15); }
    .pestana:hover .pestana-icon { transform: scale(1.15) rotate(5deg); }
    
    .pestana.activa { 
      background: linear-gradient(135deg, rgba(255,45,117,0.3), rgba(0,229,255,0.2));
      border-color: #ffea00;
      box-shadow: 0 0 20px rgba(255,234,0,0.3);
    }
    
    .pestana.activa .pestana-text { background: linear-gradient(135deg, #ffea00, #ffffff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    
    /* Contenido con scroll elegante */
    .contenido { 
      flex: 1; 
      overflow-y: auto; 
      padding: 1rem 2rem 2rem;
      scroll-behavior: smooth;
    }
    
    .contenido::-webkit-scrollbar { width: 5px; }
    .contenido::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    .contenido::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #ff2d75, #00e5ff); border-radius: 10px; }
    
    .panel { display: none; }
    .panel.activo { display: block; animation: slideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Tarjetas de productos - EFECTO 3D ALUCINANTE */
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.8rem; }
    
    .producto-card { 
      background: rgba(10, 10, 25, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 32px; 
      padding: 1.5rem 1rem; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      text-align: center; 
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      cursor: pointer;
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }
    
    /* Efecto de brillo 3D */
    .producto-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255,45,117,0.2), rgba(0,229,255,0.2));
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 0;
    }
    
    .producto-card:hover::before {
      opacity: 1;
    }
    
    .producto-card:hover { 
      transform: translateY(-12px) scale(1.02);
      border-color: #ff2d75;
      box-shadow: 0 30px 50px -20px rgba(255,45,117,0.5), 0 0 0 2px rgba(255,45,117,0.3);
    }
    
    .producto-card img { 
      width: 130px; 
      height: 130px; 
      object-fit: cover; 
      border-radius: 50%; 
      border: 3px solid #ff2d75;
      margin-bottom: 1.2rem;
      transition: all 0.4s ease;
      box-shadow: 0 0 20px rgba(255,45,117,0.4);
      position: relative;
      z-index: 1;
    }
    
    .producto-card:hover img {
      transform: scale(1.08);
      border-color: #00e5ff;
      box-shadow: 0 0 40px rgba(0,229,255,0.6);
    }
    
    .producto-card h4 { font-size: 1.4rem; color: white; margin-bottom: 0.6rem; font-weight: 600; position: relative; z-index: 1; }
    .producto-precio { 
      font-size: 1.6rem; 
      font-weight: 800; 
      padding: 0.5rem 1.3rem; 
      border-radius: 60px; 
      display: inline-block; 
      background: linear-gradient(135deg, rgba(255,45,117,0.3), rgba(0,229,255,0.2));
      border: 1px solid rgba(255,234,0,0.5);
      color: #ffea00;
      position: relative;
      z-index: 1;
    }
    
    /* Liados - efecto neón */
    .liados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
    
    .liado-card {
      background: linear-gradient(145deg, rgba(15, 15, 35, 0.8), rgba(5, 5, 20, 0.9));
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0,229,255,0.3);
      border-radius: 40px;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    
    .liado-card::after {
      content: '✦';
      position: absolute;
      bottom: -20px;
      right: -20px;
      font-size: 60px;
      opacity: 0;
      transition: all 0.4s ease;
      color: rgba(0,229,255,0.2);
    }
    
    .liado-card:hover::after {
      opacity: 1;
      transform: translate(-20px, -20px);
    }
    
    .liado-card:hover {
      transform: translateY(-10px);
      border-color: #ffea00;
      box-shadow: 0 25px 45px -20px rgba(0,229,255,0.4);
    }
    
    .liado-icon { font-size: 4.5rem; margin-bottom: 0.8rem; filter: drop-shadow(0 0 15px #00e5ff); transition: all 0.3s ease; }
    .liado-card:hover .liado-icon { transform: scale(1.1); filter: drop-shadow(0 0 25px #ff2d75); }
    .liado-card h4 { font-size: 1.5rem; color: white; margin-bottom: 0.5rem; }
    .liado-precio { font-size: 1.4rem; font-weight: 700; padding: 0.4rem 1.3rem; border-radius: 50px; background: rgba(0,0,0,0.4); border: 1px solid #ffea00; color: #ffea00; }
    
    /* Munchies */
    .munchies-categoria {
      background: rgba(10, 10, 30, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,45,117,0.2);
    }
    
    .categoria-titulo { 
      font-size: 2rem; 
      margin-bottom: 1.2rem; 
      display: inline-block; 
      background: linear-gradient(135deg, #ffea00, #ff2d75, #00e5ff);
      background-size: 200% 200%;
      -webkit-background-clip: text; 
      background-clip: text; 
      color: transparent; 
      border-bottom: 3px solid #ff2d75;
      padding-bottom: 0.3rem;
      animation: catGlow 3s ease infinite;
    }
    
    @keyframes catGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    
    .items-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    
    .item-munchi {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(90deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
      padding: 1rem 1.8rem;
      border-radius: 80px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.3s ease;
    }
    
    .item-munchi:hover {
      transform: translateX(10px);
      border-color: #ffea00;
      background: linear-gradient(90deg, rgba(255,45,117,0.1), rgba(0,229,255,0.05));
    }
    
    .item-nombre { font-size: 1.4rem; color: white; font-weight: 500; letter-spacing: 1px; }
    .item-precio { font-size: 1.5rem; font-weight: 800; color: #ffea00; text-shadow: 0 0 10px rgba(255,234,0,0.3); }
    
    /* Eventos - galería espectacular */
    .eventos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.8rem; }
    
    .evento-card {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      aspect-ratio: 4/3;
      transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      cursor: pointer;
    }
    
    .evento-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }
    
    .evento-card:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
    }
    
    .evento-card:hover img {
      transform: scale(1.08);
    }
    
    .evento-card::after {
      content: '✦ VER EVENTO ✦';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.8), transparent);
      padding: 20px;
      text-align: center;
      color: white;
      font-weight: bold;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      font-size: 0.9rem;
      letter-spacing: 2px;
    }
    
    .evento-card:hover::after {
      transform: translateY(0);
    }
    
    .evento-delete {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ff2d75;
      color: white;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      display: none;
      z-index: 10;
      transition: all 0.2s ease;
      box-shadow: 0 0 15px #ff2d75;
    }
    
    .evento-delete:hover { transform: scale(1.1); background: #ff0055; }
    .admin-mode .evento-delete { display: block; }
    
    /* Botón Admin */
    .admin-btn-float {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(15, 15, 35, 0.9);
      backdrop-filter: blur(12px);
      border: 2px solid #ff2d75;
      color: #ff2d75;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(255,45,117,0.4);
      animation: btnPulse 2s ease-in-out infinite;
    }
    
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,45,117,0.4); transform: scale(1); }
      50% { box-shadow: 0 0 40px rgba(255,45,117,0.8); transform: scale(1.05); }
    }
    
    .admin-btn-float:hover {
      transform: scale(1.1) rotate(180deg);
      border-color: #00e5ff;
      color: #00e5ff;
      box-shadow: 0 0 50px rgba(0,229,255,0.6);
    }
    
    /* Save indicator */
    .save-indicator {
      position: fixed;
      bottom: 100px;
      right: 30px;
      background: linear-gradient(135deg, #ffea00, #ff2d75);
      color: white;
      padding: 15px 30px;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: bold;
      box-shadow: 0 0 40px #ffea00;
      z-index: 2100;
      display: none;
      animation: popIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }
    
    @keyframes popIn {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      70% { transform: scale(1.1) rotate(0deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    
    /* Admin panel - estilizado */
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .admin-card { background: #0c0c1a; border: 2px solid #ff2d75; border-radius: 24px; padding: 15px; cursor: grab; transition: all 0.2s ease; }
    .admin-card:active { cursor: grabbing; }
    .admin-card.dragging { opacity: 0.5; }
    .admin-card.drag-over { border: 3px dashed #00e5ff; background: #1a1a35; }
    .admin-img { width: 100%; height: 180px; object-fit: cover; border-radius: 20px; margin-bottom: 10px; border: 2px solid #ff2d75; }
    .admin-input, .admin-precio { width: 100%; padding: 12px; margin-bottom: 10px; background: #030310; border: 1px solid #ff2d75; border-radius: 16px; color: white; font-size: 1.3rem; }
    .admin-file-input { display: none; }
    .admin-btn { width: 100%; padding: 12px; border: none; border-radius: 40px; font-size: 1.3rem; cursor: pointer; margin-bottom: 5px; font-weight: bold; }
    .btn-upload { background: #1a1a35; color: white; border: 1px solid #00e5ff; }
    .btn-delete { background: #ff2d75; color: white; }
    .drag-handle { text-align: center; font-size: 1rem; margin-bottom: 10px; cursor: grab; background: rgba(255,45,117,0.15); border-radius: 40px; padding: 6px; border: 1px solid #ff2d75; }
    
    @media (max-width: 768px) {
      .logo-masquehigh { font-size: 3rem; }
      .logo-club { font-size: 2rem; letter-spacing: 6px; }
      .productos-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .producto-card img { width: 90px; height: 90px; }
    }
  </style>
</head>
<body>

<script>
  // Crear partículas flotantes dinámicas
  (function createParticles() {
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const size = Math.random() * 4 + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = Math.random() * 15 + 8 + 's';
      particle.style.animationDelay = Math.random() * 10 + 's';
      particle.style.background = `radial-gradient(circle, ${['#ff2d75', '#00e5ff', '#ffea00', '#00ffaa'][Math.floor(Math.random() * 4)]}88, transparent)`;
      document.body.appendChild(particle);
    }
  })();
</script>

<main class="kiosco">
  <div class="header">
    <div class="logo">
      <div class="logo-masquehigh">MASQUEHIGH</div>

<div id="saveIndicator" class="save-indicator">✅ GUARDADO</div>

<script>
  const CONTRASENA = "situs123";
  const STORAGE_KEY = 'masquehigh_premium_v4';

  const COLOR_MAP = {
    extracciones: { color: '#ff2d75', glow: '#ff2d75', bg: 'rgba(255, 45, 117, 0.15)' },
    hierbas: { color: '#00ffaa', glow: '#00ffaa', bg: 'rgba(0, 255, 170, 0.1)' },
    hash: { color: '#ff7700', glow: '#ff7700', bg: 'rgba(255, 119, 0, 0.1)' },
    liados: { color: '#00e5ff', glow: '#00e5ff', bg: 'rgba(0, 229, 255, 0.1)' },
    munchies: { color: '#ffea00', glow: '#ffea00', bg: 'rgba(255, 234, 0, 0.08)' },
    eventos: { color: '#b800ff', glow: '#b800ff', bg: 'rgba(184, 0, 255, 0.1)' }
  };

  let secciones = [
    { id: "extracciones", nombre: "EXTRACCIONES", icono: "⚡", tipo: "productos", items: [], colorKey: "extracciones" },
    { id: "hierbas", nombre: "HIERBAS", icono: "🌿", tipo: "productos", items: [], colorKey: "hierbas" },
    { id: "hash", nombre: "HASH", icono: "🍫", tipo: "productos", items: [], colorKey: "hash" },
    { id: "liados", nombre: "LIADOS", icono: "🚬", tipo: "liados", items: [], colorKey: "liados" },
    { id: "munchies", nombre: "MUNCHIES", icono: "🍕", tipo: "munchies", sub: { bebidas: [], picar: [] }, colorKey: "munchies" },
    { id: "eventos", nombre: "EVENTOS", icono: "🎉", tipo: "eventos", items: [], colorKey: "eventos" }
  ];

  const DEFAULT_EXTRA = [
    { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ff2d75"/%3E%3Ctext x="50" y="55" fill="white" font-size="10"%3EBHO%3C/text%3E%3C/svg%3E', nombre: 'BHO TROPICANA CHERRY', precio: '28€/g' },
    { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ff2d75"/%3E%3Ctext x="50" y="55" fill="white"%3ETAITELLA%3C/text%3E%3C/svg%3E', nombre: 'TAITELLA', precio: '24€/g' },
    { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ff2d75"/%3E%3Ctext x="50" y="55" fill="white"%3EICE%3C/text%3E%3C/svg%3E', nombre: 'ICE MAC1 PLUS', precio: '18€/g' }
  ];
  const DEFAULT_HIERBAS = [
    { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%2300ffaa"/%3E%3Ctext x="50" y="55" fill="black"%3ELONDON%3C/text%3E%3C/svg%3E', nombre: 'LONDON CAKE', precio: '8€/g' },
    { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%2300ffaa"/%3E%3Ctext x="50" y="55" fill="black"%3EAMNESIA%3C/text%3E%3C/svg%3E', nombre: 'AMNESIA', precio: '4€/g' }
  ];
  const DEFAULT_HASH = [
    { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23ff7700"/%3E%3Ctext x="50" y="55" fill="white"%3EGORILA%3C/text%3E%3C/svg%3E', nombre: 'GORILA', precio: '6€/g' }
  ];
  const DEFAULT_LIADOS = [
    { nombre: 'CRITICAL X GORILA', precio: '1x3€ | 2x5€' },
    { nombre: 'AMNESIA', precio: '1x3€ | 2x5€' }
  ];
  const DEFAULT_BEBIDAS = [{ nombre: 'COCACOLA', precio: '2€' }, { nombre: 'AGUA', precio: '1.50€' }];
  const DEFAULT_PICAR = [{ nombre: 'PATATAS', precio: '1.50€' }];
  const DEFAULT_EVENTOS = [
    'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23b800ff"/%3E%3Ctext x="100" y="110" fill="white"%3EEVENTO%3C/text%3E%3C/svg%3E',
    'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23b800ff"/%3E%3Ctext x="100" y="110" fill="white"%3EFIESTA%3C/text%3E%3C/svg%3E'
  ];

  let draggedIndex = null, currentSecId = null;

  function getColor(sec) { return COLOR_MAP[sec.colorKey] || COLOR_MAP.liados; }

  function cargarDatos() {
    const g = localStorage.getItem(STORAGE_KEY);
    if (g) { try { const d = JSON.parse(g); if (d.secciones) secciones = d.secciones; else secciones = d; } catch(e) {} }
    secciones.forEach(s => {
      if (!s.colorKey) { const m = { extracciones: 'extracciones', hierbas: 'hierbas', hash: 'hash', liados: 'liados', munchies: 'munchies', eventos: 'eventos' }[s.id]; s.colorKey = m || 'liados'; }
      if (s.tipo === 'productos' && (!s.items || !s.items.length)) { if (s.id === 'extracciones') s.items = JSON.parse(JSON.stringify(DEFAULT_EXTRA)); else if (s.id === 'hierbas') s.items = JSON.parse(JSON.stringify(DEFAULT_HIERBAS)); else if (s.id === 'hash') s.items = JSON.parse(JSON.stringify(DEFAULT_HASH)); else s.items = []; }
      if (s.tipo === 'liados' && (!s.items || !s.items.length)) s.items = JSON.parse(JSON.stringify(DEFAULT_LIADOS));
      if (s.tipo === 'munchies' && (!s.sub || !s.sub.bebidas)) s.sub = { bebidas: JSON.parse(JSON.stringify(DEFAULT_BEBIDAS)), picar: JSON.parse(JSON.stringify(DEFAULT_PICAR)) };
      if (s.tipo === 'eventos' && (!s.items || !s.items.length)) s.items = JSON.parse(JSON.stringify(DEFAULT_EVENTOS));
    });
    renderTodo();
  }

  function guardar() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ secciones })); showIndicator(); }

  function renderTodo() { renderPestanas(); renderPaneles(); }

  function renderPestanas() {
    const c = document.getElementById('pestanasContainer');
    c.innerHTML = '';
    secciones.forEach((s, i) => {
      const p = document.createElement('div');
      p.className = 'pestana' + (i === 0 ? ' activa' : '');
      p.innerHTML = `<div class="pestana-icon">${s.icono}</div><div class="pestana-text">${s.nombre}</div>`;
      p.addEventListener('click', () => {
        document.querySelectorAll('.pestana').forEach((x, idx) => { x.classList.toggle('activa', idx === i); });
        document.querySelectorAll('.panel').forEach((x, idx) => { x.classList.toggle('activo', idx === i); });
      });
      c.appendChild(p);
    });
  }

  function renderPaneles() {
    const cont = document.getElementById('contenidoPaneles');
    cont.innerHTML = '';
    secciones.forEach((s, idx) => {
      const panel = document.createElement('div');
      panel.className = 'panel' + (idx === 0 ? ' activo' : '');
      const col = getColor(s);
      if (s.tipo === 'productos') panel.innerHTML = `<div class="subseccion"><h3 class="subseccion-titulo" style="color:${col.color}; border-left-color:${col.color}">${s.icono} ${s.nombre}</h3><div class="productos-grid" id="grid-${s.id}"></div></div>`;
      else if (s.tipo === 'liados') panel.innerHTML = `<div class="subseccion"><h3 class="subseccion-titulo" style="color:${col.color}">🚬 ${s.nombre}</h3><div class="liados-grid" id="grid-${s.id}"></div></div>`;
      else if (s.tipo === 'munchies') panel.innerHTML = `<div><div class="munchies-categoria"><div class="categoria-titulo">🥤 BEBIDAS</div><div class="items-lista" id="bebidas-lista-${s.id}"></div></div><div class="munchies-categoria"><div class="categoria-titulo">🍿 PICAR</div><div class="items-lista" id="picar-lista-${s.id}"></div></div></div>`;
      else if (s.tipo === 'eventos') panel.innerHTML = `<div class="subseccion"><h3 class="subseccion-titulo" style="color:${col.color}">🎉 ${s.nombre}</h3><div class="eventos-grid" id="eventos-grid-${s.id}"></div></div>`;
      cont.appendChild(panel);
    });
    secciones.forEach(s => { if (s.tipo === 'productos') llenarProductos(s); if (s.tipo === 'liados') llenarLiados(s); if (s.tipo === 'munchies') llenarMunchies(s); if (s.tipo === 'eventos') llenarEventos(s); });
  }

  function llenarProductos(s) {
    const g = document.getElementById(`grid-${s.id}`); if (!g) return;
    const col = getColor(s);
    g.innerHTML = '';
    s.items.forEach(it => { g.innerHTML += `<div class="producto-card"><img src="${it.img}" style="border-color:${col.color}"><h4>${it.nombre}</h4><div class="producto-precio">${it.precio}</div></div>`; });
  }

  function llenarLiados(s) {
    const g = document.getElementById(`grid-${s.id}`); if (!g) return;
    const col = getColor(s);
    g.innerHTML = '';
    s.items.forEach(it => { g.innerHTML += `<div class="liado-card"><div class="liado-icon" style="filter:drop-shadow(0 0 12px ${col.color})">🚬</div><h4>${it.nombre}</h4><div class="liado-precio">${it.precio}</div></div>`; });
  }

  function llenarMunchies(s) {
    const col = getColor(s);
    const b = document.getElementById(`bebidas-lista-${s.id}`);
    const p = document.getElementById(`picar-lista-${s.id}`);
    if (b) { b.innerHTML = ''; s.sub.bebidas.forEach(it => { b.innerHTML += `<div class="item-munchi"><span class="item-nombre">${it.nombre}</span><span class="item-precio">${it.precio}</span></div>`; }); }
    if (p) { p.innerHTML = ''; s.sub.picar.forEach(it => { p.innerHTML += `<div class="item-munchi"><span class="item-nombre">${it.nombre}</span><span class="item-precio">${it.precio}</span></div>`; }); }
  }

  function llenarEventos(s) {
    const g = document.getElementById(`eventos-grid-${s.id}`); if (!g) return;
    g.innerHTML = '';
    s.items.forEach((img, i) => { g.innerHTML += `<div class="evento-card"><img src="${img}"><button class="evento-delete" onclick="eliminarEvento('${s.id}', ${i})">✖</button></div>`; });
  }

  function iniciarDrag(e, i, sid) { draggedIndex = i; currentSecId = sid; e.target.closest('.admin-card')?.classList.add('dragging'); }
  function finalizarDrag(e) { e.target.closest('.admin-card')?.classList.remove('dragging'); draggedIndex = null; currentSecId = null; }
  function permitirDrop(e) { e.preventDefault(); }
  function soltarDrop(e, ti, sid) { e.preventDefault(); if (draggedIndex !== null && currentSecId === sid && draggedIndex !== ti) { const sec = secciones.find(s => s.id === sid); if (sec?.items) { const [m] = sec.items.splice(draggedIndex, 1); sec.items.splice(ti, 0, m); guardar(); renderTodo(); mostrarSeccionAdmin(sid); } } document.querySelectorAll('.admin-card').forEach(c => c.classList.remove('drag-over', 'dragging')); }
  function marcarSobreDrop(e) { e.preventDefault(); const tc = e.target.closest('.admin-card'); if (tc) { document.querySelectorAll('.admin-card').forEach(c => c.classList.remove('drag-over')); tc.classList.add('drag-over'); } }
  function limpiarMarcador(e) { e.target.closest('.admin-card')?.classList.remove('drag-over'); }

  function mostrarLogin() { document.getElementById('panel-login').style.display = 'flex'; }
  function cerrarLogin() { document.getElementById('panel-login').style.display = 'none'; document.getElementById('login-error').style.display = 'none'; }
  function comprobarLogin() { if (document.getElementById('login-password').value === CONTRASENA) { document.getElementById('panel-login').style.display = 'none'; document.getElementById('panel-admin').style.display = 'block'; document.body.classList.add('admin-mode'); renderAdminUI(); } else { document.getElementById('login-error').style.display = 'block'; } }
  function cerrarAdmin() { document.getElementById('panel-admin').style.display = 'none'; document.body.classList.remove('admin-mode'); }
  
  function renderAdminUI() {
    const sl = document.getElementById('seccionesAdminList');
    sl.innerHTML = '<strong style="color:#ff2d75;">🗑️ ELIMINAR SECCIÓN:</strong>';
    secciones.forEach((s, i) => { const b = document.createElement('button'); b.textContent = `❌ ${s.nombre}`; b.style.cssText = `background:${getColor(s).color}; color:white; border:none; border-radius:30px; padding:8px 20px; cursor:pointer; margin:4px;`; b.onclick = () => eliminarSeccion(i); sl.appendChild(b); });
    const tc = document.getElementById('adminTabsContainer');
    tc.innerHTML = '';
    secciones.forEach(s => { const b = document.createElement('button'); b.textContent = `${s.icono} ${s.nombre}`; b.style.cssText = `background:${getColor(s).bg}; border:2px solid ${getColor(s).color}; border-radius:30px; padding:10px 22px; cursor:pointer; color:${getColor(s).color}; font-weight:bold; transition:0.2s;`; b.onclick = () => mostrarSeccionAdmin(s.id); tc.appendChild(b); });
    document.getElementById('addNewSectionBtn').onclick = () => añadirSeccion();
  }

  function eliminarSeccion(i) { if (secciones.length <= 1) return alert("No se puede eliminar"); if (confirm(`¿Eliminar "${secciones[i].nombre}"?`)) { secciones.splice(i, 1); guardar(); renderTodo(); renderAdminUI(); document.getElementById('admin-contenido').innerHTML = '<p style="color:#888; text-align:center;">Selecciona una sección</p>'; } }
  function añadirSeccion() { let n = prompt("Nombre:"); if (!n) return; let i = prompt("Icono:", "📦"); let t = prompt("Tipo (productos/liados/eventos/munchies):", "productos"); if (!['productos','liados','eventos','munchies'].includes(t)) t = "productos"; const ns = { id: "sec_"+Date.now(), nombre: n.toUpperCase(), icono: i || "📦", tipo: t, colorKey: "liados" }; if (t === 'productos') ns.items = []; if (t === 'liados') ns.items = []; if (t === 'eventos') ns.items = []; if (t === 'munchies') ns.sub = { bebidas: [], picar: [] }; secciones.push(ns); guardar(); renderTodo(); renderAdminUI(); mostrarSeccionAdmin(ns.id); }
  
  function mostrarSeccionAdmin(sid) {
    const s = secciones.find(x => x.id === sid); if (!s) return;
    const col = getColor(s);
    let html = '';
    if (s.tipo === 'productos') {
      html = `<h3 style="color:${col.color}; margin-bottom:20px;">${s.icono} ${s.nombre} <span style="font-size:0.9rem;">(Arrastra para reordenar)</span></h3><div class="admin-grid" id="admin-grid-${s.id}">`;
      s.items.forEach((it, i) => { html += `<div class="admin-card" style="border-color:${col.color}" draggable="true" ondragstart="iniciarDrag(event,${i},'${s.id}')" ondragend="finalizarDrag(event)" ondragover="permitirDrop(event)" ondrop="soltarDrop(event,${i},'${s.id}')" ondragenter="marcarSobreDrop(event)" ondragleave="limpiarMarcador(event)"><div class="drag-handle" style="border-color:${col.color}">⋮⋮ ARRASTRAR ⋮⋮</div><img src="${it.img}" id="admin-img-${s.id}-${i}" class="admin-img" style="border-color:${col.color}"><input type="file" id="file-${s.id}-${i}" class="admin-file-input" accept="image/*" onchange="subirImagen('${s.id}',${i})"><button onclick="document.getElementById('file-${s.id}-${i}').click()" class="admin-btn btn-upload" style="border-color:${col.color}">📷 CAMBIAR FOTO</button><input type="text" id="nombre-${s.id}-${i}" value="${it.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizar('${s.id}',${i},'nombre',this.value)"><input type="text" id="precio-${s.id}-${i}" value="${it.precio}" class="admin-precio" style="border-color:${col.color};color:${col.color}" placeholder="Precio" onchange="actualizar('${s.id}',${i},'precio',this.value)"><button onclick="eliminarItem('${s.id}',${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
      html += `</div><button onclick="añadirItem('${s.id}')" style="width:100%; background:${col.color}; border:none; border-radius:40px; padding:16px; color:white; font-weight:bold; cursor:pointer; margin-top:15px;">➕ AÑADIR PRODUCTO</button>`;
    } else if (s.tipo === 'liados') {
      html = `<h3 style="color:${col.color}; margin-bottom:20px;">${s.icono} ${s.nombre}</h3><div class="admin-grid" id="admin-grid-${s.id}">`;
      s.items.forEach((it, i) => { html += `<div class="admin-card" style="border-color:${col.color}" draggable="true" ondragstart="iniciarDrag(event,${i},'${s.id}')" ondragend="finalizarDrag(event)" ondragover="permitirDrop(event)" ondrop="soltarDrop(event,${i},'${s.id}')" ondragenter="marcarSobreDrop(event)" ondragleave="limpiarMarcador(event)"><div class="drag-handle" style="border-color:${col.color}">⋮⋮ ARRASTRAR ⋮⋮</div><div style="font-size:4rem; text-align:center">🚬</div><input type="text" id="nombre-${s.id}-${i}" value="${it.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizar('${s.id}',${i},'nombre',this.value)"><input type="text" id="precio-${s.id}-${i}" value="${it.precio}" class="admin-precio" style="border-color:${col.color};color:${col.color}" placeholder="Precio" onchange="actualizar('${s.id}',${i},'precio',this.value)"><button onclick="eliminarItem('${s.id}',${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
      html += `</div><button onclick="añadirItem('${s.id}')" style="width:100%; background:${col.color}; border:none; border-radius:40px; padding:16px; color:white; font-weight:bold; cursor:pointer; margin-top:15px;">➕ AÑADIR LIADO</button>`;
    } else if (s.tipo === 'munchies') {
      html = `<h3 style="color:${col.color}">${s.icono} ${s.nombre} - BEBIDAS</h3><div class="admin-grid">`;
      s.sub.bebidas.forEach((it, i) => { html += `<div class="admin-card" style="border-color:${col.color}"><input type="text" id="bebida-nombre-${s.id}-${i}" value="${it.nombre.replace(/"/g, '&quot;')}" class="admin-input" onchange="actualizarMunchi('${s.id}','bebidas',${i},'nombre',this.value)"><input type="text" id="bebida-precio-${s.id}-${i}" value="${it.precio}" class="admin-precio" style="border-color:${col.color};color:${col.color}" onchange="actualizarMunchi('${s.id}','bebidas',${i},'precio',this.value)"><button onclick="eliminarMunchi('${s.id}','bebidas',${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
      html += `</div><button onclick="añadirMunchi('${s.id}','bebidas')" style="width:100%; background:${col.color}; border:none; border-radius:40px; padding:16px; color:white; font-weight:bold; cursor:pointer; margin-bottom:30px;">➕ AÑADIR BEBIDA</button>`;
      html += `<h3 style="color:${col.color}; margin-top:30px">${s.icono} ${s.nombre} - PICAR</h3><div class="admin-grid">`;
      s.sub.picar.forEach((it, i) => { html += `<div class="admin-card" style="border-color:${col.color}"><input type="text" id="picar-nombre-${s.id}-${i}" value="${it.nombre.replace(/"/g, '&quot;')}" class="admin-input" onchange="actualizarMunchi('${s.id}','picar',${i},'nombre',this.value)"><input type="text" id="picar-precio-${s.id}-${i}" value="${it.precio}" class="admin-precio" style="border-color:${col.color};color:${col.color}" onchange="actualizarMunchi('${s.id}','picar',${i},'precio',this.value)"><button onclick="eliminarMunchi('${s.id}','picar',${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
      html += `</div><button onclick="añadirMunchi('${s.id}','picar')" style="width:100%; background:${col.color}; border:none; border-radius:40px; padding:16px; color:white; font-weight:bold; cursor:pointer; margin-top:15px;">➕ AÑADIR PRODUCTO</button>`;
    } else if (s.tipo === 'eventos') {
      html = `<h3 style="color:${col.color}">${s.icono} ${s.nombre}</h3><div class="admin-grid">`;
      s.items.forEach((img, i) => { html += `<div class="admin-card" style="border-color:${col.color}"><img src="${img}" id="evento-img-${s.id}-${i}" class="admin-img" style="border-color:${col.color}"><input type="file" id="evento-file-${s.id}-${i}" class="admin-file-input" accept="image/*" onchange="subirImagenEvento('${s.id}',${i})"><button onclick="document.getElementById('evento-file-${s.id}-${i}').click()" class="admin-btn btn-upload" style="border-color:${col.color}">📷 CAMBIAR FOTO</button><button onclick="eliminarEvento('${s.id}',${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button></div>`; });
      html += `</div><button onclick="añadirEvento('${s.id}')" style="width:100%; background:${col.color}; border:none; border-radius:40px; padding:16px; color:white; font-weight:bold; cursor:pointer; margin-top:15px;">➕ AÑADIR CARTEL</button>`;
    }
    document.getElementById('admin-contenido').innerHTML = html;
  }

  function actualizar(sid, idx, campo, val) { const s = secciones.find(x => x.id === sid); if (s?.items?.[idx]) { s.items[idx][campo] = val; guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }
  function añadirItem(sid) { const s = secciones.find(x => x.id === sid); if (s) { if (s.tipo === 'productos') s.items.push({ img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%2300e5ff"/%3E%3Ctext x="50" y="55" fill="black"%3ENUEVO%3C/text%3E%3C/svg%3E', nombre: 'NUEVO', precio: '0€' }); if (s.tipo === 'liados') s.items.push({ nombre: 'NUEVO LIADO', precio: '0€' }); guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }
  function eliminarItem(sid, idx) { if (!confirm('¿Eliminar?')) return; const s = secciones.find(x => x.id === sid); if (s?.items?.[idx]) { s.items.splice(idx, 1); guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }
  function actualizarMunchi(sid, sub, idx, campo, val) { const s = secciones.find(x => x.id === sid); if (s?.sub?.[sub]?.[idx]) { s.sub[sub][idx][campo] = val; guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }
  function añadirMunchi(sid, sub) { const s = secciones.find(x => x.id === sid); if (s) { s.sub[sub].push({ nombre: 'NUEVO', precio: '0€' }); guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }
  function eliminarMunchi(sid, sub, idx) { if (!confirm('¿Eliminar?')) return; const s = secciones.find(x => x.id === sid); if (s?.sub?.[sub]?.[idx]) { s.sub[sub].splice(idx, 1); guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }
  function añadirEvento(sid) { const s = secciones.find(x => x.id === sid); if (s) { s.items.push('data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%2300e5ff"/%3E%3Ctext x="100" y="110" fill="black"%3ENUEVO%3C/text%3E%3C/svg%3E'); guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }
  function eliminarEvento(sid, idx) { if (!confirm('¿Eliminar cartel?')) return; const s = secciones.find(x => x.id === sid); if (s?.items?.[idx]) { s.items.splice(idx, 1); guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }
  async function subirImagen(sid, idx) { const inp = document.getElementById(`file-${sid}-${idx}`); if (inp.files?.[0]) { const r = new FileReader(); r.onload = async e => { const comp = await comprimir(e.target.result); const s = secciones.find(x => x.id === sid); if (s?.items?.[idx]) { s.items[idx].img = comp; guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }; r.readAsDataURL(inp.files[0]); } }
  async function subirImagenEvento(sid, idx) { const inp = document.getElementById(`evento-file-${sid}-${idx}`); if (inp.files?.[0]) { const r = new FileReader(); r.onload = async e => { const comp = await comprimir(e.target.result); const s = secciones.find(x => x.id === sid); if (s?.items?.[idx]) { s.items[idx] = comp; guardar(); renderTodo(); mostrarSeccionAdmin(sid); } }; r.readAsDataURL(inp.files[0]); } }
  function comprimir(data, calidad=0.7, max=600) { return new Promise(r => { const img = new Image(); img.onload = () => { const c = document.createElement('canvas'); let w = img.width, h = img.height; if (w > max) { h = (max / w) * h; w = max; } c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h); r(c.toDataURL('image/jpeg', calidad)); }; img.src = data; }); }
  function guardarTodo() { guardar(); alert("✅ Cambios guardados correctamente"); }
  function showIndicator() { const i = document.getElementById('saveIndicator'); i.style.display = 'block'; setTimeout(() => i.style.display = 'none', 2000); }
  window.addEventListener('load', cargarDatos);
</script>
