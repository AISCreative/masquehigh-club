<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0c14">
  <title>Masquehigh Club · Catálogo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0c14; }
    body { background: radial-gradient(circle at 30% 30%, #1a2a3a 0%, #030408 100%); display: flex; justify-content: center; align-items: center; padding: 8px; position: relative; }
    body::before { content: "MASQUEHIGH CLUB"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; color: rgba(255, 24, 208, 0.08); white-space: nowrap; letter-spacing: 12px; text-transform: uppercase; pointer-events: none; z-index: 1; animation: floatLogo 20s infinite alternate ease-in-out; }
    @keyframes floatLogo { 0% { transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); opacity: 0.08; } 100% { transform: translate(-48%, -52%) rotate(-8deg) scale(1.25); opacity: 0.12; } }
    
    .kiosco { width: 100%; max-width: 1280px; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border: 2px solid #00ff9f; border-radius: 30px; box-shadow: 0 0 40px #00ff9f66; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
    
    .header { padding: 1.5rem 1.5rem 0.8rem; text-align: center; border-bottom: 2px solid #ff18d0; background: linear-gradient(180deg, rgba(255, 24, 208, 0.1) 0%, transparent 100%); }
    .logo-masquehigh { font-size: 4.8rem; font-weight: 900; color: #00ff9f; text-shadow: 0 0 25px #00ff9f; line-height: 1.1; }
    .logo-club { font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; color: #ff44e0; margin-top: -0.5rem; text-shadow: 0 0 20px rgba(255, 68, 224, 0.5); }
    .welcome { font-size: 1.6rem; color: #ffffff; background: linear-gradient(90deg, transparent, rgba(255, 24, 208, 0.2), transparent); padding: 0.3rem 1rem; border-radius: 40px; display: inline-block; border: 1px solid #ff18d0; }
    
    /* Pestañas - SCROLL HORIZONTAL (estilo El Tio J) */
    .pestanas-wrapper {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 1rem 1rem;
      scrollbar-width: thin;
    }
    .pestanas { display: flex; gap: 1rem; min-width: max-content; }
    .pestana { 
      background: rgba(8, 8, 16, 0.9); 
      border: 2px solid; 
      border-radius: 20px; 
      padding: 0.8rem 1.5rem; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      cursor: pointer; 
      transition: all 0.2s ease; 
      min-width: 130px; 
    }
    .pestana-icon { font-size: 2rem; }
    .pestana-text { font-size: 1.2rem; font-weight: 700; white-space: nowrap; color: white; letter-spacing: 1px; }
    .pestana.activa { transform: scale(1.02); border-width: 3px; background: rgba(255, 255, 255, 0.05); box-shadow: 0 0 25px currentColor; }
    
    .contenido { flex: 1; overflow-y: auto; padding: 1rem; }
    .panel { display: none; }
    .panel.activo { display: block; }
    
    .subseccion { background: rgba(0, 0, 0, 0.5); border-radius: 24px; padding: 1.2rem; margin-bottom: 1.5rem; border: 1px solid; }
    .subseccion-titulo { font-size: 2rem; margin-bottom: 1rem; padding-left: 1rem; border-left: 8px solid; text-shadow: 0 0 10px currentColor; }
    
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.2rem; }
    .producto-card { background: #0d0f1a; border: 2px solid; border-radius: 20px; padding: 1rem 0.8rem; display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.2s ease; }
    .producto-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 0 25px currentColor; }
    .producto-card img { width: 110px; height: 110px; object-fit: cover; border-radius: 50%; border: 3px solid; margin-bottom: 0.8rem; box-shadow: 0 0 15px currentColor; }
    .producto-card h4 { font-size: 1.3rem; color: white; margin-bottom: 0.5rem; }
    .producto-precio { font-size: 1.4rem; font-weight: 800; padding: 0.3rem 1rem; border-radius: 40px; display: inline-block; background: rgba(0,0,0,0.5); border: 2px solid; }
    
    .liados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.2rem; }
    .liado-card { background: linear-gradient(145deg, #1a1a2a, #0d0f1a); border: 3px solid; border-radius: 24px; padding: 1.2rem 0.8rem; display: flex; flex-direction: column; align-items: center; text-align: center; transition: all 0.2s ease; }
    .liado-card:hover { transform: translateY(-5px); box-shadow: 0 0 25px currentColor; }
    .liado-icon { font-size: 4rem; margin-bottom: 0.5rem; filter: drop-shadow(0 0 10px currentColor); }
    .liado-card h4 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .liado-precio { font-size: 1.4rem; font-weight: 800; padding: 0.3rem 1.2rem; border-radius: 40px; display: inline-block; background: rgba(0,0,0,0.5); border: 2px solid; }
    
    .munchies-categoria { background: rgba(20, 5, 25, 0.6); border: 2px solid; border-radius: 30px; padding: 1.2rem; margin-bottom: 1.5rem; }
    .categoria-titulo { font-size: 2.4rem; margin-bottom: 1rem; border-bottom: 3px solid; padding-bottom: 0.5rem; display: inline-block; text-shadow: 0 0 10px currentColor; }
    .items-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 0.8rem; }
    .item-munchi { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.5); padding: 0.8rem 1.2rem; border-radius: 60px; border: 2px solid; transition: all 0.2s ease; }
    .item-munchi:hover { transform: translateX(5px); box-shadow: 0 0 15px currentColor; }
    .item-nombre { font-size: 1.4rem; color: white; text-transform: uppercase; font-weight: 600; }
    .item-precio { font-size: 1.5rem; font-weight: 800; }
    
    .eventos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; padding: 0.5rem; }
    .evento-card { background: transparent; border: 3px solid; border-radius: 20px; overflow: hidden; aspect-ratio: 1/1.2; position: relative; transition: all 0.2s ease; }
    .evento-card:hover { transform: scale(1.02); box-shadow: 0 0 30px currentColor; }
    .evento-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .evento-delete { position: absolute; top: 8px; right: 8px; background: #ff18d0; color: white; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 22px; cursor: pointer; display: none; z-index: 100; box-shadow: 0 0 10px #ff18d0; }
    .admin-mode .evento-delete { display: block; }
    
    .save-indicator { position: fixed; bottom: 100px; right: 30px; background: #00ff9f; color: black; padding: 15px 25px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 0 25px #00ff9f; z-index: 2100; display: none; border: 2px solid #ff18d0; }
    
    /* Estilos admin - estilo El Tio J */
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .admin-card { 
      background: #0d0f1a; 
      border: 2px solid; 
      border-radius: 20px; 
      padding: 15px; 
      cursor: grab;
      transition: all 0.2s ease;
    }
    .admin-card:active { cursor: grabbing; }
    .admin-card.dragging { opacity: 0.5; cursor: grabbing; }
    .admin-card.drag-over { border: 3px dashed; background: #1a1a2a; }
    .admin-img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; border: 2px solid; }
    .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #030308; border: 2px solid #00ff9f; border-radius: 10px; color: white; font-size: 1.4rem; }
    .admin-input:focus { outline: none; border-color: currentColor; }
    .admin-precio { width: 100%; padding: 12px; margin-bottom: 10px; background: #030308; border: 2px solid; border-radius: 10px; font-size: 1.4rem; font-weight: bold; }
    .admin-file-input { display: none; }
    .admin-btn { width: 100%; padding: 12px; border: none; border-radius: 30px; font-size: 1.4rem; cursor: pointer; margin-bottom: 5px; font-weight: bold; }
    .btn-upload { background: #00ff9f; color: black; border: 1px solid #ff18d0; }
    .btn-delete { background: #ff18d0; color: white; }
    .drag-handle { 
      text-align: center; 
      font-size: 1.2rem; 
      margin-bottom: 10px; 
      cursor: grab;
      background: rgba(255,255,255,0.05);
      border-radius: 30px;
      padding: 5px;
      border: 1px solid;
    }
    .drag-handle:active { cursor: grabbing; }
  </style>
</head>
<body>
  <main class="kiosco">
    <div class="header">
      <div class="logo">
        <div class="logo-masquehigh">MASQUEHIGH</div>
        <div class="logo-club">CLUB</div>
      </div>
      <div class="welcome">✨ Bienvenido a Masquehigh Club ✨</div>
    </div>

    <div class="pestanas-wrapper">
      <div class="pestanas" id="pestanasContainer"></div>
    </div>

    <div class="contenido" id="contenidoPaneles"></div>
  </main>

  <!-- Botón ADMIN -->
  <div style="position: fixed; bottom: 30px; right: 30px; z-index: 2000;">
    <button id="btn-admin" onclick="mostrarLogin()" style="width: 70px; height: 70px; border-radius: 50%; background: #0d0f1a; border: 3px solid #00ff9f; color: #00ff9f; font-size: 32px; box-shadow: 0 0 25px #00ff9f; cursor: pointer; transition: all 0.2s ease;">⚙️</button>
  </div>

  <!-- PANEL LOGIN -->
  <div id="panel-login" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); z-index: 2001; align-items: center; justify-content: center;">
    <div style="background: #0b0c14; border: 3px solid #00ff9f; border-radius: 40px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 0 60px #ff18d0;">
      <h2 style="color: #00ff9f; text-align: center; font-size: 3rem; margin-bottom: 30px;">🔐 ADMIN</h2>
      <input type="password" id="login-password" placeholder="Contraseña" style="width: 100%; padding: 25px; font-size: 2rem; background: #1a1a2a; border: 2px solid #ff18d0; border-radius: 30px; color: white; margin-bottom: 30px; text-align: center;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <button onclick="comprobarLogin()" style="background: #00ff9f; border: 2px solid #ff18d0; border-radius: 30px; padding: 25px; font-size: 2rem; font-weight: bold; color: black; cursor: pointer;">ENTRAR</button>
        <button onclick="cerrarLogin()" style="background: #22223b; border: 2px solid #ff18d0; border-radius: 30px; padding: 25px; font-size: 2rem; font-weight: bold; color: white; cursor: pointer;">CERRAR</button>
      </div>
      <p id="login-error" style="color: #ff18d0; text-align: center; font-size: 1.8rem; margin-top: 20px; display: none;">❌ Contraseña incorrecta</p>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="panel-admin" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c14; z-index: 2002; overflow-y: auto; padding: 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; background: #0d0f1a; padding: 20px; border-radius: 20px; border: 2px solid #00ff9f;">
      <h2 style="color: #00ff9f; font-size: 2.5rem;">✏️ EDITAR TODO</h2>
      <div style="display: flex; gap: 10px;">
        <button id="addNewSectionBtn" style="background: #ff18d0; border: 2px solid #00ff9f; border-radius: 40px; padding: 12px 24px; font-size: 1.4rem; font-weight: bold; color: white; cursor: pointer;">➕ AÑADIR SECCIÓN</button>
        <button onclick="cerrarAdmin()" style="background: #22223b; border: 2px solid #ff18d0; border-radius: 40px; padding: 12px 24px; font-size: 1.4rem; color: white; cursor: pointer;">CERRAR</button>
      </div>
    </div>
    
    <div id="seccionesAdminList" style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; background: #0d0f1a; padding: 15px; border-radius: 20px; border: 1px solid #00ff9f;"></div>
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;" id="adminTabsContainer"></div>
    
    <div id="admin-contenido" style="background: #0d0f1a; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #00ff9f;">
      <p style="color: #888; text-align: center; font-size: 1.8rem;">Selecciona una sección para editar</p>
    </div>
    
    <button onclick="guardarTodo()" style="width: 100%; background: linear-gradient(135deg, #00ff9f, #ff18d0); border: 2px solid #ffff00; border-radius: 60px; padding: 25px; font-size: 2.5rem; font-weight: bold; color: white; cursor: pointer; box-shadow: 0 0 20px #00ff9f;">💾 GUARDAR CAMBIOS</button>
  </div>

  <div id="saveIndicator" class="save-indicator">✅ GUARDADO</div>

  <script>
    const CONTRASENA = "situs123";
    const STORAGE_KEY = 'masquehigh_datos_dinamico_v1';

    // Colores NEON para cada tipo de sección (estilo Masquehigh)
    const COLORES_POR_TIPO = {
      extracciones: { color: '#00ff9f', glow: '#00ff9f', bg: 'rgba(0, 255, 159, 0.1)' },
      hierbas: { color: '#7cfc00', glow: '#7cfc00', bg: 'rgba(124, 252, 0, 0.1)' },
      hash: { color: '#b87333', glow: '#b87333', bg: 'rgba(184, 115, 51, 0.1)' },
      liados: { color: '#ffaa00', glow: '#ffaa00', bg: 'rgba(255, 170, 0, 0.1)' },
      munchies: { color: '#ff18d0', glow: '#ff18d0', bg: 'rgba(255, 24, 208, 0.1)' },
      eventos: { color: '#ffff00', glow: '#ffff00', bg: 'rgba(255, 255, 0, 0.1)' }
    };

    // Estructura dinámica de secciones (estilo El Tio J)
    let secciones = [
      { id: "extracciones", nombre: "EXTRACCIONES", icono: "⚡", tipo: "productos", items: [], colorKey: "extracciones" },
      { id: "hierbas", nombre: "HIERBAS", icono: "🌿", tipo: "productos", items: [], colorKey: "hierbas" },
      { id: "hash", nombre: "HASH", icono: "🍫", tipo: "productos", items: [], colorKey: "hash" },
      { id: "liados", nombre: "LIADOS", icono: "🚬", tipo: "liados", items: [], colorKey: "liados" },
      { id: "munchies", nombre: "MUNCHIES", icono: "🍕", tipo: "munchies", sub: { bebidas: [], picar: [] }, colorKey: "munchies" },
      { id: "eventos", nombre: "EVENTOS", icono: "🎉", tipo: "eventos", items: [], colorKey: "eventos" }
    ];

    // Datos por defecto de Masquehigh
    const DEFAULT_EXTRA = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%2300ff9f"/%3E%3Ctext x="50" y="55" fill="black" font-size="10" text-anchor="middle"%3EBHO%3C/text%3E%3C/svg%3E', nombre: 'BHO TROPICANA CHERRY', precio: '28€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%2300ff9f"/%3E%3Ctext x="50" y="55" fill="black" font-size="10"%3ETAITELLA%3C/text%3E%3C/svg%3E', nombre: 'TAITELLA', precio: '24€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%2300ff9f"/%3E%3Ctext x="50" y="55" fill="black"%3EICE%3C/text%3E%3C/svg%3E', nombre: 'ICE MAC1 PLUS', precio: '18€/g' }
    ];
    const DEFAULT_HIERBAS = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%237cfc00"/%3E%3Ctext x="50" y="55" fill="black"%3ELONDON%3C/text%3E%3C/svg%3E', nombre: 'LONDON CAKE', precio: '8€/g' },
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%237cfc00"/%3E%3Ctext x="50" y="55" fill="black"%3EAMNESIA%3C/text%3E%3C/svg%3E', nombre: 'AMNESIA', precio: '4€/g' }
    ];
    const DEFAULT_HASH = [
      { img: 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect width="100" height="100" fill="%23b87333"/%3E%3Ctext x="50" y="55" fill="white"%3EGORILA%3C/text%3E%3C/svg%3E', nombre: 'GORILA', precio: '6€/g' }
    ];
    const DEFAULT_LIADOS = [
      { nombre: 'CRITICAL X GORILA', precio: '1x3€ | 2x5€' },
      { nombre: 'AMNESIA', precio: '1x3€ | 2x5€' }
    ];
    const DEFAULT_BEBIDAS = [{ nombre: 'COCACOLA', precio: '2€' }, { nombre: 'AGUA', precio: '1.50€' }];
    const DEFAULT_PICAR = [{ nombre: 'PATATAS', precio: '1.50€' }];
    const DEFAULT_EVENTOS = [
      'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23ffff00"/%3E%3Ctext x="100" y="110" fill="black" text-anchor="middle"%3EEVENTO%3C/text%3E%3C/svg%3E',
      'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"%3E%3Crect width="200" height="200" fill="%23ffff00"/%3E%3Ctext x="100" y="110" fill="black"%3EFIESTA%3C/text%3E%3C/svg%3E'
    ];

    let draggedItem = null;
    let draggedIndex = null;
    let currentSecId = null;

    function getColorForSection(sec) {
      if (sec.colorKey && COLORES_POR_TIPO[sec.colorKey]) return COLORES_POR_TIPO[sec.colorKey];
      return { color: '#00ff9f', glow: '#00ff9f', bg: 'rgba(0, 255, 159, 0.1)' };
    }

    function cargarDatos() {
      const guardado = localStorage.getItem(STORAGE_KEY);
      if (guardado) {
        try {
          const data = JSON.parse(guardado);
          if (data.secciones) secciones = data.secciones;
          else secciones = data;
        } catch(e) {}
      }
      secciones.forEach(sec => {
        if (!sec.colorKey) {
          if (sec.id === 'extracciones') sec.colorKey = 'extracciones';
          else if (sec.id === 'hierbas') sec.colorKey = 'hierbas';
          else if (sec.id === 'hash') sec.colorKey = 'hash';
          else if (sec.id === 'liados') sec.colorKey = 'liados';
          else if (sec.id === 'munchies') sec.colorKey = 'munchies';
          else if (sec.id === 'eventos') sec.colorKey = 'eventos';
          else sec.colorKey = 'extracciones';
        }
        if (sec.tipo === 'productos' && (!sec.items || sec.items.length === 0)) {
          if (sec.id === 'extracciones') sec.items = JSON.parse(JSON.stringify(DEFAULT_EXTRA));
          else if (sec.id === 'hierbas') sec.items = JSON.parse(JSON.stringify(DEFAULT_HIERBAS));
          else if (sec.id === 'hash') sec.items = JSON.parse(JSON.stringify(DEFAULT_HASH));
          else sec.items = [];
        }
        if (sec.tipo === 'liados' && (!sec.items || sec.items.length === 0)) sec.items = JSON.parse(JSON.stringify(DEFAULT_LIADOS));
        if (sec.tipo === 'munchies' && (!sec.sub || !sec.sub.bebidas)) sec.sub = { bebidas: JSON.parse(JSON.stringify(DEFAULT_BEBIDAS)), picar: JSON.parse(JSON.stringify(DEFAULT_PICAR)) };
        if (sec.tipo === 'eventos' && (!sec.items || sec.items.length === 0)) sec.items = JSON.parse(JSON.stringify(DEFAULT_EVENTOS));
      });
      renderizarTodo();
    }

    function guardarCompleto() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ secciones: secciones }));
      mostrarIndicator();
    }

    function renderizarTodo() {
      renderPestanas();
      renderPaneles();
    }

    function renderPestanas() {
      const container = document.getElementById('pestanasContainer');
      container.innerHTML = '';
      secciones.forEach((sec, idx) => {
        const pest = document.createElement('div');
        pest.className = 'pestana';
        if (idx === 0) pest.classList.add('activa');
        const color = getColorForSection(sec);
        pest.style.borderColor = color.color;
        pest.style.color = color.color;
        if (pest.classList.contains('activa')) {
          pest.style.boxShadow = `0 0 25px ${color.color}`;
        }
        pest.innerHTML = `<div class="pestana-icon">${sec.icono}</div><div class="pestana-text">${sec.nombre}</div>`;
        pest.addEventListener('click', () => {
          document.querySelectorAll('.pestana').forEach(p => {
            p.classList.remove('activa');
            p.style.boxShadow = '';
          });
          pest.classList.add('activa');
          pest.style.boxShadow = `0 0 25px ${color.color}`;
          document.querySelectorAll('.panel').forEach((p, i) => { p.classList.toggle('activo', i === idx); });
        });
        container.appendChild(pest);
      });
    }

    function renderPaneles() {
      const contenedor = document.getElementById('contenidoPaneles');
      contenedor.innerHTML = '';
      secciones.forEach((sec, idx) => {
        const panel = document.createElement('div');
        panel.className = 'panel' + (idx === 0 ? ' activo' : '');
        let html = '';
        if (sec.tipo === 'productos') {

    // Funciones de drag & drop
    function iniciarDrag(e, index, secId) {
      draggedIndex = index;
      currentSecId = secId;
      e.dataTransfer.setData('text/plain', index);
      e.target.closest('.admin-card')?.classList.add('dragging');
    }

    function finalizarDrag(e) {
      if (e.target.closest('.admin-card')) {
        e.target.closest('.admin-card').classList.remove('dragging');
      }
      draggedIndex = null;
      currentSecId = null;
    }

    function permitirDrop(e) { e.preventDefault(); }

    function soltarDrop(e, targetIndex, secId) {
      e.preventDefault();
      if (draggedIndex !== null && currentSecId === secId && draggedIndex !== targetIndex) {
        const sec = secciones.find(s => s.id === secId);
        if (sec && sec.items) {
          const [movedItem] = sec.items.splice(draggedIndex, 1);
          sec.items.splice(targetIndex, 0, movedItem);
          guardarCompleto();
          renderizarTodo();
          mostrarSeccionAdmin(secId);
        }
      }
      document.querySelectorAll('.admin-card').forEach(card => {
        card.classList.remove('drag-over', 'dragging');
      });
    }

    function marcarSobreDrop(e) {
      e.preventDefault();
      const targetCard = e.target.closest('.admin-card');
      if (targetCard) {
        document.querySelectorAll('.admin-card').forEach(card => card.classList.remove('drag-over'));
        targetCard.classList.add('drag-over');
      }
    }

    function limpiarMarcador(e) {
      const targetCard = e.target.closest('.admin-card');
      if (targetCard) targetCard.classList.remove('drag-over');
    }

    function eliminarSeccion(index) {
      if (secciones.length <= 1) {
        alert("No puedes eliminar la única sección que queda.");
        return;
      }
      if (confirm(`¿Eliminar la sección "${secciones[index].nombre}"?`)) {
        secciones.splice(index, 1);
        guardarCompleto();
        renderizarTodo();
        renderAdminUI();
        document.getElementById('admin-contenido').innerHTML = '<p style="color: #888; text-align: center; font-size: 1.8rem;">Selecciona una sección para editar</p>';
      }

    function añadirNuevaSeccion() {
      let nombre = prompt("Nombre de la nueva sección (ej: 'CREMAS', 'PIPAS'):");
      if (!nombre) return;
      let icono = prompt("Icono emoji (ej: 💎, 🧴, 🥨):", "📦");
      if (!icono) icono = "📦";
      let tipo = prompt("Tipo: 'productos', 'liados', 'eventos', 'munchies'", "productos");
      if (!['productos', 'liados', 'eventos', 'munchies'].includes(tipo)) tipo = "productos";
      
      const newId = "sec_" + Date.now();
      
      let nuevaSeccion = { id: newId, nombre: nombre.toUpperCase(), icono: icono, tipo: tipo, colorKey: "extracciones" };
      
      if (tipo === 'productos') nuevaSeccion.items = [];
      else if (tipo === 'liados') nuevaSeccion.items = [];
      else if (tipo === 'eventos') nuevaSeccion.items = [];
      else if (tipo === 'munchies') nuevaSeccion.sub = { bebidas: [], picar: [] };
      
      secciones.push(nuevaSeccion);
      guardarCompleto();
      renderizarTodo();
      renderAdminUI();
      mostrarSeccionAdmin(newId);
    }

    async function subirImagenProducto(secId, index) {
      const input = document.getElementById(`file-${secId}-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          const sec = secciones.find(s => s.id === secId);
          if (sec && sec.items[index]) {
            sec.items[index].img = imgComprimida;
            guardarCompleto();
            renderizarTodo();
            mostrarSeccionAdmin(secId);
          }
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function subirImagenEvento(secId, index) {
      const input = document.getElementById(`evento-file-${secId}-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          const sec = secciones.find(s => s.id === secId);
          if (sec && sec.items[index]) {
            sec.items[index] = imgComprimida;
            guardarCompleto();
            renderizarTodo();
            mostrarSeccionAdmin(secId);
          }
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function comprimirImagen(dataUrl, calidad = 0.7, maxAncho = 600) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let ancho = img.width;
          let alto = img.height;
          if (ancho > maxAncho) {
            alto = (maxAncho / ancho) * alto;
            ancho = maxAncho;
          }
          canvas.width = ancho;
          canvas.height = alto;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, ancho, alto);
          resolve(canvas.toDataURL('image/jpeg', calidad));
        };
        img.src = dataUrl;
      });
    }

    function guardarTodo() {
      guardarCompleto();
      alert("✅ Todos los cambios guardados correctamente");
    }

    function mostrarIndicator() {
      const indicator = document.getElementById('saveIndicator');
      indicator.style.display = 'block';
      setTimeout(() => indicator.style.display = 'none', 2000);
    }

    window.addEventListener('load', cargarDatos);
  </script>
</body>
</html>
