<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0c14">
  <link rel="manifest" href="manifest.json">
  
  <title>Masquehigh Club · Catálogo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0c14; }
    body { background: radial-gradient(circle at 30% 30%, #1a2a3a 0%, #030408 100%); display: flex; justify-content: center; align-items: center; padding: 8px; position: relative; }
    body::before { content: "MASQUEHIGH CLUB"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; color: rgba(255, 24, 208, 0.08); white-space: nowrap; letter-spacing: 12px; text-transform: uppercase; pointer-events: none; z-index: 1; animation: floatLogo 20s infinite alternate ease-in-out; }
    @keyframes floatLogo { 0% { transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); opacity: 0.08; } 100% { transform: translate(-48%, -52%) rotate(-8deg) scale(1.25); opacity: 0.12; } }
    .kiosco { width: 100%; max-width: 1280px; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border: 2px solid #00ff9f; border-radius: 30px; box-shadow: 0 0 40px #00ff9f66; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
    .header { padding: 1.5rem 1.5rem 0.8rem; text-align: center; border-bottom: 2px solid #ff18d0; }
    .logo-masquehigh { font-size: 4.8rem; font-weight: 900; color: #00ff9f; text-shadow: 0 0 25px #00ff9f; line-height: 1.1; }
    .logo-club { font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; color: #ff44e0; margin-top: -0.5rem; }
    .welcome { font-size: 1.6rem; color: #ffffff; background: linear-gradient(90deg, transparent, rgba(255, 24, 208, 0.2), transparent); padding: 0.3rem 1rem; border-radius: 40px; display: inline-block; }
    .pestanas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; padding: 0.8rem 1.5rem; }
    .pestana { background: rgba(10, 10, 20, 0.9); border: 2px solid; border-radius: 15px; padding: 0.7rem 0.2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
    .pestana.genero { border-color: #00ff9f; color: #00ff9f; }
    .pestana.liados { border-color: #ffaa00; color: #ffaa00; }
    .pestana.munchies { border-color: #ff18d0; color: #ff18d0; }
    .pestana.eventos { border-color: #ffff00; color: #ffff00; }
    .pestana.activa { transform: scale(1.02); box-shadow: 0 0 20px currentColor; border-width: 3px; background: rgba(20, 20, 30, 0.95); }
    .pestana-icon { font-size: 2.2rem; }
    .pestana-text { font-size: 1.3rem; font-weight: 700; }
    .contenido { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
    .panel { display: none; }
    .panel.activo { display: block; }
    .subseccion { background: rgba(0, 0, 0, 0.5); border: 1px solid #ff18d0; border-radius: 20px; padding: 1rem; margin-bottom: 1.2rem; }
    .subseccion-titulo { font-size: 2rem; color: #ff18d0; text-shadow: 0 0 10px #ff18d0; margin-bottom: 1rem; padding-left: 0.8rem; border-left: 6px solid #00ff9f; }
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
    .producto-card { background: #0d0f1a; border: 2px solid #3a2b4a; border-radius: 18px; padding: 0.8rem 0.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; }
    .producto-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #00ff9f; box-shadow: 0 0 0 2px #ff18d0; margin-bottom: 0.5rem; }
    .producto-card h4 { font-size: 1.2rem; color: white; text-shadow: 0 0 5px #00ff9f; margin-bottom: 0.25rem; }
    .producto-precio { font-size: 1.3rem; font-weight: 800; color: #00ff9f; background: rgba(255, 24, 208, 0.2); padding: 0.2rem 1rem; border-radius: 30px; border: 1px solid #ff18d0; display: inline-block; }
    .liados-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1.2rem; }
    .liado-card { background: linear-gradient(145deg, #1a1a2a, #0d0f1a); border: 3px solid #ffaa00; border-radius: 20px; padding: 1.2rem 0.8rem; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 0 15px rgba(255, 170, 0, 0.3); position: relative; }
    .liado-icon { font-size: 4rem; margin-bottom: 0.5rem; filter: drop-shadow(0 0 10px #ffaa00); }
    .liado-card h4 { font-size: 1.5rem; color: #ffaa00; text-shadow: 0 0 10px #ffaa00; margin-bottom: 0.5rem; }
    .liado-precio { font-size: 1.4rem; font-weight: 800; color: white; background: rgba(255, 170, 0, 0.3); padding: 0.3rem 1.2rem; border-radius: 30px; border: 2px solid #ffaa00; display: inline-block; }
    .munchies-categoria { background: rgba(20, 5, 25, 0.7); border: 2px solid #ff18d0; border-radius: 30px; padding: 1.5rem 1.2rem; margin-bottom: 1.5rem; }
    .categoria-titulo { font-size: 2.6rem; color: #ff18d0; text-shadow: 0 0 15px #ff18d0; margin-bottom: 1.5rem; border-bottom: 3px dotted #00ff9f; padding-bottom: 0.5rem; display: inline-block; }
    .items-lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem; }
    .item-munchi { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.6); padding: 0.8rem 1.2rem; border-radius: 60px; border: 1px solid #00ff9f; position: relative; }
    .item-nombre { font-size: 1.4rem; color: white; text-transform: uppercase; }
    .item-precio { font-size: 1.5rem; font-weight: 800; color: #00ff9f; }
    
    /* EVENTOS: 4 IMÁGENES EN 2 COLUMNAS */
    .eventos-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      padding: 0.5rem;
    }
    
    .evento-card { 
      background: transparent;
      border: 3px solid #ffff00;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 1/1.2;
    }
    
    .evento-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .save-indicator { position: fixed; bottom: 100px; right: 30px; background: #00ff9f; color: black; padding: 15px 25px; border-radius: 50px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 0 20px #00ff9f; z-index: 2100; display: none; }

    /* Estilos para admin */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .admin-card {
      background: #0d0f1a;
      border: 2px solid;
      border-radius: 20px;
      padding: 15px;
      position: relative;
    }
    
    .admin-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 15px;
      margin-bottom: 10px;
      border: 2px solid #00ff9f;
    }
    
    .admin-input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #000;
      border: 2px solid #00ff9f;
      border-radius: 10px;
      color: white;
      font-size: 1.4rem;
    }
    
    .admin-precio {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #000;
      border: 2px solid #ff18d0;
      border-radius: 10px;
      color: #00ff9f;
      font-size: 1.4rem;
    }
    
    .admin-file-input {
      display: none;
    }
    
    .admin-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 30px;
      font-size: 1.4rem;
      cursor: pointer;
      margin-bottom: 5px;
      font-weight: bold;
    }
    
    .btn-upload {
      background: #00ff9f;
    }
    
    .btn-delete {
      background: #ff18d0;
      color: white;
    }
  </style>
</head>
<body>
  <main class="kiosco">
    <div class="header">
      <div class="logo">
        <div class="logo-masquehigh">MASQUEHIGH</div>
        <div class="logo-club">CLUB</div>
      </div>
      <div class="welcome">✨ Bienvenido a Masquehigh Club ✨</div>
    </div>

    <div class="pestanas">
      <div class="pestana genero activa" data-pestana="genero">
        <div class="pestana-icon">🌿</div>
        <div class="pestana-text">GÉNERO</div>
      </div>
      <div class="pestana liados" data-pestana="liados">
        <div class="pestana-icon">🚬</div>
        <div class="pestana-text">LIADOS</div>
      </div>
      <div class="pestana munchies" data-pestana="munchies">
        <div class="pestana-icon">🍕</div>
        <div class="pestana-text">MUNCHIES</div>
      </div>
      <div class="pestana eventos" data-pestana="eventos">
        <div class="pestana-icon">🎉</div>
        <div class="pestana-text">EVENTOS</div>
      </div>
    </div>

    <div class="contenido">
      <!-- PANEL GÉNERO -->
      <div id="panel-genero" class="panel activo">
        <div class="catalogo-grid">
          <!-- EXTRACCIÓN -->
          <div class="subseccion">
            <h3 class="subseccion-titulo">⚡ EXTRACCIÓN</h3>
            <div class="productos-grid" id="extract-grid"></div>
          </div>
          <!-- HIERBAS -->
          <div class="subseccion">
            <h3 class="subseccion-titulo">🌿 HIERBAS</h3>
            <div class="productos-grid" id="hierbas-grid"></div>
          </div>
        </div>
      </div>

      <!-- PANEL LIADOS -->
      <div id="panel-liados" class="panel">
        <div class="subseccion" style="border-color: #ffaa00;">
          <h3 class="subseccion-titulo" style="color: #ffaa00; border-left-color: #ffaa00;">🚬 PORROS LIADOS</h3>
          <div class="liados-grid" id="liados-grid"></div>
        </div>
      </div>

      <!-- PANEL MUNCHIES -->
      <div id="panel-munchies" class="panel">
        <div class="munchies-grid">
          <div class="munchies-categoria">
            <div class="categoria-titulo">🥤 BEBIDAS</div>
            <div class="items-lista" id="refrescos-lista"></div>
          </div>
          <div class="munchies-categoria">
            <div class="categoria-titulo">🍿 PARA PICAR</div>
            <div class="items-lista" id="picar-lista"></div>
          </div>
        </div>
      </div>

      <!-- PANEL EVENTOS -->
      <div id="panel-eventos" class="panel">
        <div class="eventos-grid" id="eventos-grid"></div>
      </div>
    </div>
  </main>

  <!-- Botón ADMIN -->
  <div style="position: fixed; bottom: 30px; right: 30px; z-index: 2000;">
    <button id="btn-admin" onclick="mostrarLogin()" style="width: 70px; height: 70px; border-radius: 50%; background: #00ff9f; border: 4px solid #ff18d0; color: black; font-size: 30px; box-shadow: 0 0 30px #00ff9f; cursor: pointer;">⚙️</button>
  </div>

  <!-- PANEL LOGIN -->
  <div id="panel-login" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2001; align-items: center; justify-content: center;">
    <div style="background: #0b0c14; border: 4px solid #00ff9f; border-radius: 40px; padding: 40px; width: 90%; max-width: 500px; box-shadow: 0 0 60px #ff18d0;">
      <h2 style="color: #00ff9f; text-align: center; font-size: 3rem; margin-bottom: 30px;">🔐 ADMIN</h2>
      <input type="password" id="login-password" placeholder="Contraseña" style="width: 100%; padding: 25px; font-size: 2rem; background: #1a1a2a; border: 3px solid #ff18d0; border-radius: 30px; color: white; margin-bottom: 30px; text-align: center;">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <button onclick="comprobarLogin()" style="background: #00ff9f; border: none; border-radius: 30px; padding: 25px; font-size: 2rem; font-weight: bold; cursor: pointer;">ENTRAR</button>
        <button onclick="cerrarLogin()" style="background: #ff18d0; border: none; border-radius: 30px; padding: 25px; font-size: 2rem; font-weight: bold; color: white; cursor: pointer;">CERRAR</button>
      </div>
      <p id="login-error" style="color: #ff18d0; text-align: center; font-size: 1.8rem; margin-top: 20px; display: none;">❌ Contraseña incorrecta</p>
    </div>
  </div>

  <!-- PANEL ADMIN -->
  <div id="panel-admin" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c14; z-index: 2002; overflow-y: auto; padding: 20px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h2 style="color: #00ff9f; font-size: 2.5rem;">✏️ EDITAR TODO</h2>
      <button onclick="cerrarAdmin()" style="background: #ff18d0; border: none; border-radius: 40px; padding: 15px 30px; font-size: 1.8rem; color: white; cursor: pointer;">CERRAR</button>
    </div>
    
    <!-- Pestañas de secciones -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
      <button onclick="mostrarSeccion('extract')" style="flex:1; background:#00ff9f; border:none; border-radius:20px; padding:15px; font-size:1.6rem; cursor:pointer;">⚡ EXTRACCIÓN</button>
      <button onclick="mostrarSeccion('hierbas')" style="flex:1; background:#00ff9f; border:none; border-radius:20px; padding:15px; font-size:1.6rem; cursor:pointer;">🌿 HIERBAS</button>
      <button onclick="mostrarSeccion('liados')" style="flex:1; background:#ffaa00; border:none; border-radius:20px; padding:15px; font-size:1.6rem; cursor:pointer;">🚬 LIADOS</button>
      <button onclick="mostrarSeccion('refrescos')" style="flex:1; background:#ff18d0; border:none; border-radius:20px; padding:15px; font-size:1.6rem; color:white; cursor:pointer;">🥤 BEBIDAS</button>
      <button onclick="mostrarSeccion('picar')" style="flex:1; background:#ff18d0; border:none; border-radius:20px; padding:15px; font-size:1.6rem; color:white; cursor:pointer;">🍿 PICAR</button>
      <button onclick="mostrarSeccion('eventos')" style="flex:1; background:#ffff00; border:none; border-radius:20px; padding:15px; font-size:1.6rem; cursor:pointer;">🎉 EVENTOS</button>
    </div>
    
    <!-- Contenido editable -->
    <div id="admin-contenido" style="background: #1a1a2a; border-radius: 30px; padding: 20px; margin-bottom: 20px;">
      <p style="color: white; text-align: center; font-size: 1.8rem;">Selecciona una sección para editar</p>
    </div>
    
    <button onclick="guardarTodo()" style="width: 100%; background: #00ff9f; border: 4px solid #ff18d0; border-radius: 60px; padding: 25px; font-size: 2.5rem; font-weight: bold; cursor: pointer;">💾 GUARDAR CAMBIOS</button>
  </div>

  <script>
    const CONTRASENA = "situs123";
    const STORAGE_KEY = 'masquehigh_datos_final';

    // ===== DATOS POR DEFECTO =====
    const DATOS_POR_DEFECTO = {
      extract: [
        { img: 'images/image1.jpg', nombre: 'BHO TROPICANA CHERRY', precio: '28€/g' },
        { img: 'images/placeholder.jpg', nombre: 'PIATELLA', precio: '24€/g' },
        { img: 'images/image2.jpg', nombre: 'FORBBIDEN FROZEN', precio: '8€/g' },
        { img: 'images/gorila.jpg', nombre: 'GORILA', precio: '6€/g' },
        { img: 'images/placeholder.jpg', nombre: 'OG DRY', precio: '6€/g' },
        { img: 'images/placeholder.jpg', nombre: 'RUNTZ', precio: '5€/g' },
        { img: 'images/image4.jpg', nombre: 'COOKIES', precio: '5€/g' }
      ],
      hierbas: [
        { img: 'images/image5.jpg', nombre: 'LONDON CAKE', precio: '8€/g' },
        { img: 'images/image6.jpg', nombre: 'CREAM CARAMEL', precio: '6€/g' },
        { img: 'images/image7.jpg', nombre: 'AMNESIA', precio: '4€/g' },
        { img: 'images/image8.jpg', nombre: 'TANGIE', precio: '7€/g' },
        { img: 'images/image9.jpg', nombre: 'DANCE HALL', precio: '6€/g' },
        { img: 'images/image10.jpg', nombre: 'MELON', precio: '5€/g' },
        { img: 'images/image11.jpg', nombre: 'TROPICANA CHERRY', precio: '8€/g' },
        { img: 'images/image12.jpg', nombre: 'GELATO X PURPLE', precio: '7€/g' },
        { img: 'images/image13.jpg', nombre: 'JEALOUSY', precio: '7€/g' },
        { img: 'images/placeholder.jpg', nombre: 'PINE LINK', precio: '7€/g' }
      ],
      liados: [
        { nombre: 'CRITICAL X GORILA', precio: '1x3€ | 2x5€' },
        { nombre: 'MAC 1', precio: '1x3€ | 2x5€' }
      ],
      refrescos: [
        { nombre: 'AQUARIUS', precio: '2€' },
        { nombre: 'FANTA', precio: '2€' },
        { nombre: 'NESTEA', precio: '2€' },
        { nombre: 'ESTRELLA', precio: '2€' },
        { nombre: 'REDBULL', precio: '2.50€' },
        { nombre: 'CAFÉ SOLO', precio: '1€' },
        { nombre: 'COCACOLA', precio: '2€' },
        { nombre: 'MONSTER', precio: '2.50€' },
        { nombre: 'AGUA', precio: '1.50€' },
        { nombre: 'HEINEKEN', precio: '2€' },
        { nombre: 'COMB. LATA', precio: '5€' },
        { nombre: 'CAFÉ CON LECHE', precio: '1.20€' }
      ],
      picar: [
        { nombre: 'PATATAS', precio: '1.50€' },
        { nombre: 'CHUCHAS', precio: '1.50€' },
        { nombre: 'PALOMITAS', precio: '1.20€' }
      ],
      eventos: [
        'images/image14.jpg',
        'images/image15.jpg',
        'images/image16.jpg',
        'images/image17.jpg'
      ]
    };

    // ===== PESTAÑAS PRINCIPALES =====
    document.querySelectorAll('.pestana').forEach(p => {
      p.addEventListener('click', function() {
        document.querySelectorAll('.pestana').forEach(p => p.classList.remove('activa'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('activo'));
        this.classList.add('activa');
        document.getElementById('panel-' + this.dataset.pestana).classList.add('activo');
      });
    });

    // ===== LOGIN =====
    function mostrarLogin() {
      document.getElementById('panel-login').style.display = 'flex';
    }
    
    function cerrarLogin() {
      document.getElementById('panel-login').style.display = 'none';
      document.getElementById('login-password').value = '';
    }
    
    function comprobarLogin() {
      if (document.getElementById('login-password').value === CONTRASENA) {
        document.getElementById('panel-login').style.display = 'none';
        document.getElementById('panel-admin').style.display = 'block';
        document.getElementById('login-error').style.display = 'none';
        // Mostrar primera sección por defecto
        mostrarSeccion('extract');
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }
    
    function cerrarAdmin() {
      document.getElementById('panel-admin').style.display = 'none';
    }

    // ===== FUNCIÓN PARA COMPRIMIR IMÁGENES =====
    function comprimirImagen(dataUrl, calidad = 0.7, maxAncho = 600) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          let ancho = img.width;
          let alto = img.height;
          
          if (ancho > maxAncho) {
            alto = (maxAncho / ancho) * alto;
            ancho = maxAncho;
          }
          
          canvas.width = ancho;
          canvas.height = alto;
          
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, ancho, alto);
          
          const dataUrlComprimida = canvas.toDataURL('image/jpeg', calidad);
          resolve(dataUrlComprimida);
        };
        img.src = dataUrl;
      });
    }

    // ===== FUNCIONES PARA GUARDAR Y CARGAR =====
    function guardarDatos(datos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
    }

    function cargarDatos() {
      const guardado = localStorage.getItem(STORAGE_KEY);
      let datos;
      
      if (guardado) {
        try {
          datos = JSON.parse(guardado);
        } catch (e) {
          console.error('Error al cargar datos, usando por defecto:', e);
          datos = DATOS_POR_DEFECTO;
        }
      } else {
        datos = DATOS_POR_DEFECTO;
      }
      
      // Renderizar todas las secciones
      renderizarExtract(datos.extract || []);
      renderizarHierbas(datos.hierbas || []);
      renderizarLiados(datos.liados || []);
      renderizarRefrescos(datos.refrescos || []);
      renderizarPicar(datos.picar || []);
      renderizarEventos(datos.eventos || []);
    }

    // ===== FUNCIONES DE RENDERIZADO =====
    function renderizarExtract(items) {
      const grid = document.getElementById('extract-grid');
      grid.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'producto-card';
        div.innerHTML = `
          <img src="${item.img}" id="extract-img-${i}">
          <h4 id="extract-nombre-${i}">${item.nombre}</h4>
          <div class="producto-precio" id="extract-precio-${i}">${item.precio}</div>
        `;
        grid.appendChild(div);
      });
    }

    function renderizarHierbas(items) {
      const grid = document.getElementById('hierbas-grid');
      grid.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'producto-card';
        div.innerHTML = `
          <img src="${item.img}" id="hierbas-img-${i}">
          <h4 id="hierbas-nombre-${i}">${item.nombre}</h4>
          <div class="producto-precio" id="hierbas-precio-${i}">${item.precio}</div>
        `;
        grid.appendChild(div);
      });
    }

    function renderizarLiados(items) {
      const grid = document.getElementById('liados-grid');
      grid.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'liado-card';
        div.innerHTML = `
          <div class="liado-icon">🚬</div>
          <h4 id="liados-nombre-${i}">${item.nombre}</h4>
          <div class="liado-precio" id="liados-precio-${i}">${item.precio}</div>
        `;
        grid.appendChild(div);
      });
    }

    function renderizarRefrescos(items) {
      const lista = document.getElementById('refrescos-lista');
      lista.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'item-munchi';
        div.innerHTML = `
          <span class="item-nombre" id="refresco-nombre-${i}">${item.nombre}</span>
          <span class="item-precio" id="refresco-precio-${i}">${item.precio}</span>
        `;
        lista.appendChild(div);
      });
    }

    function renderizarPicar(items) {
      const lista = document.getElementById('picar-lista');
      lista.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'item-munchi';
        div.innerHTML = `
          <span class="item-nombre" id="picar-nombre-${i}">${item.nombre}</span>
          <span class="item-precio" id="picar-precio-${i}">${item.precio}</span>
        `;
        lista.appendChild(div);
      });
    }

    function renderizarEventos(imagenes) {
      const grid = document.getElementById('eventos-grid');
      grid.innerHTML = '';
      imagenes.forEach((img, i) => {
        const div = document.createElement('div');
        div.className = 'evento-card';
        div.innerHTML = `<img src="${img}" id="evento-img-${i}">`;
        grid.appendChild(div);
      });
    }

    // ===== FUNCIÓN PARA OBTENER DATOS ACTUALES =====
    function obtenerDatosActuales() {
      return {
        extract: Array.from(document.querySelectorAll('#extract-grid .producto-card')).map(card => ({
          img: card.querySelector('img').src,
          nombre: card.querySelector('h4').textContent,
          precio: card.querySelector('.producto-precio').textContent
        })),
        hierbas: Array.from(document.querySelectorAll('#hierbas-grid .producto-card')).map(card => ({
          img: card.querySelector('img').src,
          nombre: card.querySelector('h4').textContent,
          precio: card.querySelector('.producto-precio').textContent
        })),
        liados: Array.from(document.querySelectorAll('#liados-grid .liado-card')).map(card => ({
          nombre: card.querySelector('h4').textContent,
          precio: card.querySelector('.liado-precio').textContent
        })),
        refrescos: Array.from(document.querySelectorAll('#refrescos-lista .item-munchi')).map(item => ({
          nombre: item.querySelector('.item-nombre').textContent,
          precio: item.querySelector('.item-precio').textContent
        })),
        picar: Array.from(document.querySelectorAll('#picar-lista .item-munchi')).map(item => ({
          nombre: item.querySelector('.item-nombre').textContent,
          precio: item.querySelector('.item-precio').textContent
        })),
        eventos: Array.from(document.querySelectorAll('#eventos-grid img')).map(img => img.src)
      };
    }

    // ===== MOSTRAR SECCIONES PARA EDITAR =====
    function mostrarSeccion(seccion) {
      let html = '';
      const datos = obtenerDatosActuales();
      
      if (seccion === 'extract') {
        html = '<h3 style="color: #00ff9f; margin-bottom: 20px;">⚡ EXTRACCIÓN</h3>';
        html += '<div class="admin-grid">';
        datos.extract.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #00ff9f;">
              <img src="${item.img}" id="extract-img-admin-${i}" class="admin-img">
              <input type="file" id="extract-file-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenGenero('extract', ${i})">
              <button onclick="document.getElementById('extract-file-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO</button>
              <input type="text" id="extract-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarNombre('extract', ${i}, this.value)">
              <input type="text" id="extract-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarPrecio('extract', ${i}, this.value)">
              <button onclick="eliminarProducto('extract', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div>';
        html += '<button onclick="anadirProducto(\'extract\')" style="width:100%; background:#00ff9f; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR PRODUCTO</button>';
      }
      
      else if (seccion === 'hierbas') {
        html = '<h3 style="color: #00ff9f; margin-bottom: 20px;">🌿 HIERBAS</h3>';
        html += '<div class="admin-grid">';
        datos.hierbas.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #00ff9f;">
              <img src="${item.img}" id="hierbas-img-admin-${i}" class="admin-img">
              <input type="file" id="hierbas-file-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenGenero('hierbas', ${i})">
              <button onclick="document.getElementById('hierbas-file-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO</button>
              <input type="text" id="hierbas-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarNombre('hierbas', ${i}, this.value)">
              <input type="text" id="hierbas-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarPrecio('hierbas', ${i}, this.value)">
              <button onclick="eliminarProducto('hierbas', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div>';
        html += '<button onclick="anadirProducto(\'hierbas\')" style="width:100%; background:#00ff9f; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR HIERBA</button>';
      }
      
      else if (seccion === 'liados') {
        html = '<h3 style="color: #ffaa00; margin-bottom: 20px;">🚬 LIADOS</h3>';
        html += '<div class="admin-grid">';
        datos.liados.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #ffaa00;">
              <div class="liado-icon" style="font-size: 5rem; text-align: center; margin-bottom: 10px;">🚬</div>
              <input type="text" id="liados-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" style="border-color:#ffaa00; color:#ffaa00;" onchange="actualizarNombre('liados', ${i}, this.value)">
              <input type="text" id="liados-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" style="border-color:#ffaa00; color:#ffaa00;" onchange="actualizarPrecio('liados', ${i}, this.value)">
              <button onclick="eliminarProducto('liados', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div>';
        html += '<button onclick="anadirProducto(\'liados\')" style="width:100%; background:#ffaa00; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; cursor:pointer;">➕ AÑADIR LIADO</button>';
      }
      
      else if (seccion === 'refrescos') {
        html = '<h3 style="color: #ff18d0; margin-bottom: 20px;">🥤 BEBIDAS</h3>';
        html += '<div class="admin-grid">';
        datos.refrescos.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #ff18d0;">
              <input type="text" id="refresco-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarNombre('refrescos', ${i}, this.value)">
              <input type="text" id="refresco-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarPrecio('refrescos', ${i}, this.value)">
              <button onclick="eliminarProducto('refrescos', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div>';
        html += '<button onclick="anadirProducto(\'refrescos\')" style="width:100%; background:#ff18d0; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; color:white; cursor:pointer;">➕ AÑADIR BEBIDA</button>';
      }
      
      else if (seccion === 'picar') {
        html = '<h3 style="color: #ff18d0; margin-bottom: 20px;">🍿 PARA PICAR</h3>';
        html += '<div class="admin-grid">';
        datos.picar.forEach((item, i) => {
          html += `
            <div class="admin-card" style="border-color: #ff18d0;">
              <input type="text" id="picar-nombre-${i}" value="${item.nombre.replace(/"/g, '&quot;')}" class="admin-input" placeholder="Nombre" onchange="actualizarNombre('picar', ${i}, this.value)">
              <input type="text" id="picar-precio-${i}" value="${item.precio.replace(/"/g, '&quot;')}" class="admin-precio" placeholder="Precio" onchange="actualizarPrecio('picar', ${i}, this.value)">
              <button onclick="eliminarProducto('picar', ${i})" class="admin-btn btn-delete">🗑️ ELIMINAR</button>
            </div>
          `;
        });
        html += '</div>';
        html += '<button onclick="anadirProducto(\'picar\')" style="width:100%; background:#ff18d0; border:none; border-radius:30px; padding:15px; font-size:1.8rem; margin-top:10px; color:white; cursor:pointer;">➕ AÑADIR PRODUCTO</button>';
      }
      
      else if (seccion === 'eventos') {
        html = '<h3 style="color: #ffff00; margin-bottom: 20px;">🎉 EVENTOS (4 IMÁGENES)</h3>';
        html += '<div class="admin-grid">';
        for (let i = 0; i < 4; i++) {
          const imgSrc = datos.eventos[i] || '';
          html += `
            <div class="admin-card" style="border-color: #ffff00;">
              <img src="${imgSrc}" id="evento-img-admin-${i}" class="admin-img">
              <input type="file" id="evento-file-${i}" accept="image/*" class="admin-file-input" onchange="subirImagenEvento(${i})">
              <button onclick="document.getElementById('evento-file-${i}').click()" class="admin-btn btn-upload">📷 CAMBIAR FOTO ${i+1}</button>
            </div>
          `;
        }
        html += '</div>';
      }
      
      document.getElementById('admin-contenido').innerHTML = html;
    }

    // ===== FUNCIONES PARA ACTUALIZAR CAMPOS =====
    function actualizarNombre(tipo, index, valor) {
      const elemento = document.getElementById(`${tipo}-nombre-${index}`);
      if (elemento) {
        elemento.textContent = valor;
        guardarTodo();
      }
    }

    function actualizarPrecio(tipo, index, valor) {
      const elemento = document.getElementById(`${tipo}-precio-${index}`);
      if (elemento) {
        elemento.textContent = valor;
        guardarTodo();
      }
    }

    // ===== FUNCIONES PARA SUBIR IMÁGENES =====
    async function subirImagenGenero(tipo, index) {
      const input = document.getElementById(`${tipo}-file-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          
          // Actualizar vista previa
          document.getElementById(`${tipo}-img-admin-${index}`).src = imgComprimida;
          
          // Actualizar imagen principal
          const imgPrincipal = document.getElementById(`${tipo}-img-${index}`);
          if (imgPrincipal) imgPrincipal.src = imgComprimida;
          
          guardarTodo();
          mostrarIndicator();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    async function subirImagenEvento(index) {
      const input = document.getElementById(`evento-file-${index}`);
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          const imgComprimida = await comprimirImagen(e.target.result);
          
          // Actualizar vista previa
          document.getElementById(`evento-img-admin-${index}`).src = imgComprimida;
          
          // Actualizar imagen principal
          const imgPrincipal = document.getElementById(`evento-img-${index}`);
          if (imgPrincipal) imgPrincipal.src = imgComprimida;
          
          guardarTodo();
          mostrarIndicator();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    // ===== FUNCIONES PARA AÑADIR/ELIMINAR =====
    function anadirProducto(tipo) {
      const datos = obtenerDatosActuales();
      
      switch(tipo) {
        case 'extract':
          datos.extract.push({ img: 'images/placeholder.jpg', nombre: 'NUEVO PRODUCTO', precio: '0€' });
          renderizarExtract(datos.extract);
          break;
        case 'hierbas':
          datos.hierbas.push({ img: 'images/placeholder.jpg', nombre: 'NUEVA HIERBA', precio: '0€' });
          renderizarHierbas(datos.hierbas);
          break;
        case 'liados':
          datos.liados.push({ nombre: 'NUEVO LIADO', precio: '0€' });
          renderizarLiados(datos.liados);
          break;
        case 'refrescos':
          datos.refrescos.push({ nombre: 'NUEVO', precio: '0€' });
          renderizarRefrescos(datos.refrescos);
          break;
        case 'picar':
          datos.picar.push({ nombre: 'NUEVO', precio: '0€' });
          renderizarPicar(datos.picar);
          break;
      }
      
      guardarDatos(datos);
      mostrarSeccion(tipo);
      mostrarIndicator();
    }

    function eliminarProducto(tipo, index) {
      if (!confirm('¿Eliminar este producto?')) return;
      
      const datos = obtenerDatosActuales();
      
      switch(tipo) {
        case 'extract':
          datos.extract.splice(index, 1);
          renderizarExtract(datos.extract);
          break;
        case 'hierbas':
          datos.hierbas.splice(index, 1);
          renderizarHierbas(datos.hierbas);
          break;
        case 'liados':
          datos.liados.splice(index, 1);
          renderizarLiados(datos.liados);
          break;
        case 'refrescos':
          datos.refrescos.splice(index, 1);
          renderizarRefrescos(datos.refrescos);
          break;
        case 'picar':
          datos.picar.splice(index, 1);
          renderizarPicar(datos.picar);
          break;
      }
      
      guardarDatos(datos);
      mostrarSeccion(tipo);
      mostrarIndicator();
    }

    // ===== GUARDAR TODO =====
    function guardarTodo() {
      const datos = obtenerDatosActuales();
      guardarDatos(datos);
      mostrarIndicator();
    }

    function mostrarIndicator() {
      const indicator = document.getElementById('saveIndicator');
      indicator.style.display = 'block';
      setTimeout(() => indicator.style.display = 'none', 2000);
    }

    // Inicializar
    window.addEventListener('load', cargarDatos);
  </script>
</body>
</html>
