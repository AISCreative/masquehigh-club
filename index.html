<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0b0c14">
  <link rel="manifest" href="manifest.json">
  
  <title>Masquehigh Club · Catálogo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0c14; }
    body { background: radial-gradient(circle at 30% 30%, #1a2a3a 0%, #030408 100%); display: flex; justify-content: center; align-items: center; padding: 8px; position: relative; }
    body::before { content: "MASQUEHIGH CLUB"; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-12deg) scale(1.2); font-size: clamp(3rem, 15vw, 10rem); font-weight: 900; color: rgba(255, 24, 208, 0.08); white-space: nowrap; letter-spacing: 12px; text-transform: uppercase; pointer-events: none; z-index: 1; animation: floatLogo 20s infinite alternate ease-in-out; }
    
    .kiosco { width: 100%; max-width: 1280px; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); border: 2px solid #00ff9f; border-radius: 30px; box-shadow: 0 0 40px #00ff9f66; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
    .header { padding: 1.5rem 1.5rem 0.8rem; text-align: center; border-bottom: 2px solid #ff18d0; }
    .logo-masquehigh { font-size: 4.8rem; font-weight: 900; color: #00ff9f; text-shadow: 0 0 25px #00ff9f; line-height: 1.1; }
    .logo-club { font-size: 3.5rem; font-weight: 900; letter-spacing: 12px; color: #ff44e0; margin-top: -0.5rem; }
    .welcome { font-size: 1.6rem; color: #ffffff; background: linear-gradient(90deg, transparent, rgba(255, 24, 208, 0.2), transparent); padding: 0.3rem 1rem; border-radius: 40px; display: inline-block; }
    
    .pestanas { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; padding: 0.8rem 1.5rem; }
    .pestana { background: rgba(10, 10, 20, 0.9); border: 2px solid; border-radius: 15px; padding: 0.7rem 0.2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
    .pestana.generos { border-color: #00ff9f; color: #00ff9f; }
    .pestana.liados { border-color: #ffaa00; color: #ffaa00; }
    .pestana.munchies { border-color: #ff18d0; color: #ff18d0; }
    .pestana.eventos { border-color: #ffff00; color: #ffff00; }
    .pestana.activa { transform: scale(1.02); box-shadow: 0 0 20px currentColor; border-width: 3px; background: rgba(20, 20, 30, 0.95); }
    .pestana-icon { font-size: 2.2rem; }
    .pestana-text { font-size: 1.3rem; font-weight: 700; }
    
    .contenido { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
    .panel { display: none; }
    .panel.activo { display: block; }
    
    .subseccion { background: rgba(0, 0, 0, 0.5); border: 1px solid #ff18d0; border-radius: 20px; padding: 1rem; margin-bottom: 1.2rem; }
    .subseccion-titulo { font-size: 2rem; color: #ff18d0; text-shadow: 0 0 10px #ff18d0; margin-bottom: 1rem; padding-left: 0.8rem; border-left: 6px solid #00ff9f; display: flex; justify-content: space-between; align-items: center; }
    
    /* GÉNEROS CON IMAGEN */
    .productos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
    .producto-card { background: #0d0f1a; border: 2px solid #3a2b4a; border-radius: 18px; padding: 0.8rem 0.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; }
    .producto-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #00ff9f; box-shadow: 0 0 0 2px #ff18d0; margin-bottom: 0.5rem; }
    .producto-card h4 { font-size: 1.2rem; color: #ffffff; text-shadow: 0 0 5px #00ff9f; margin-bottom: 0.25rem; }
    .producto-precio { font-size: 1.3rem; font-weight: 800; color: #00ff9f; background: rgba(255, 24, 208, 0.2); padding: 0.2rem 1rem; border-radius: 30px; border: 1px solid #ff18d0; }

    /* LIADOS Y MUNCHIES SIN IMAGEN */
    .lista-tarjetas { display: grid; grid-template-columns: 1fr; gap: 0.8rem; }
    .lista-tarjetas.doble-columna { grid-template-columns: 1fr 1fr; }
    .item-tarjeta { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.6); padding: 0.8rem 1.5rem; border-radius: 60px; border: 1px solid #ffaa00; }
    .item-tarjeta.verde { border-color: #00ff9f; }
    .item-nombre { font-size: 1.4rem; color: white; text-transform: uppercase; }
    .item-precio { font-size: 1.5rem; font-weight: 800; color: #00ff9f; }

    /* EVENTOS CON IMAGEN */
    .evento-card { border: 3px solid #ffff00; border-radius: 20px; overflow: hidden; margin-bottom: 1rem; }
    .evento-card img { width: 100%; display: block; }

    /* INTERFAZ ADMIN */
    .btn-add { background: #00ff9f; color: black; border: none; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; cursor: pointer; display: none; }
    .admin-activo .btn-add { display: block; }
    .admin-activo .producto-card, .admin-activo .item-tarjeta, .admin-activo .evento-card { cursor: pointer; }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; display: none; justify-content: center; align-items: center; }
    .modal-card { background: #1a1a2a; border: 4px solid #00ff9f; border-radius: 30px; padding: 25px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 30px #00ff9f; }
    .modal-input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 2px solid #ff18d0; border-radius: 15px; color: white; font-size: 1.4rem; text-align: center; }
    
    #saveIndicator { position: fixed; bottom: 100px; right: 30px; background: #00ff9f; color: black; padding: 10px 20px; border-radius: 50px; font-weight: bold; z-index: 6000; display: none; }
    .edit-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #ff18d0; object-fit: cover; cursor: pointer; margin-bottom: 15px; }
  </style>
</head>
<body>

<main class="kiosco" id="kiosco-app">
  <div class="header">
    <div class="logo-masquehigh">MASQUEHIGH</div>
    <div class="logo-club">CLUB</div>
    <div class="welcome">✨ Bienvenido a Masquehigh Club ✨</div>
  </div>

  <div class="pestanas">
    <div class="pestana generos activa" onclick="tab('generos', this)">
      <div class="pestana-icon">🌿</div><div class="pestana-text">GENEROS</div>
    </div>
    <div class="pestana liados" onclick="tab('liados', this)">
      <div class="pestana-icon">🚬</div><div class="pestana-text">LIADOS</div>
    </div>
    <div class="pestana munchies" onclick="tab('munchies', this)">
      <div class="pestana-icon">🍕</div><div class="pestana-text">MUNCHIES</div>
    </div>
    <div class="pestana eventos" onclick="tab('eventos', this)">
      <div class="pestana-icon">🎉</div><div class="pestana-text">EVENTOS</div>
    </div>
  </div>

  <div class="contenido" id="main-content">
    <div id="panel-generos" class="panel activo">
      <div class="subseccion">
        <h3 class="subseccion-titulo">⚡ EXTRACCIONES <button class="btn-add" onclick="crear('grid', 'ext-g')">+</button></h3>
        <div class="productos-grid" id="ext-g"></div>
      </div>
      <div class="subseccion">
        <h3 class="subseccion-titulo">🌿 HIERBAS <button class="btn-add" onclick="crear('grid', 'hie-g')">+</button></h3>
        <div class="productos-grid" id="hie-g"></div>
      </div>
    </div>

    <div id="panel-liados" class="panel">
      <div class="subseccion">
        <h3 class="subseccion-titulo">🚬 PORROS LIADOS <button class="btn-add" onclick="crear('lista-naranja', 'lia-g')">+</button></h3>
        <div class="lista-tarjetas" id="lia-g"></div>
      </div>
    </div>

    <div id="panel-munchies" class="panel">
      <div class="subseccion">
        <h3 class="subseccion-titulo">🥤 REFRESCOS <button class="btn-add" onclick="crear('lista-verde', 'beb-l')">+</button></h3>
        <div id="beb-l" class="lista-tarjetas"></div>
      </div>
      <div class="subseccion">
        <h3 class="subseccion-titulo">🍟 PARA PICAR <button class="btn-add" onclick="crear('lista-verde', 'com-l')">+</button></h3>
        <div id="com-l" class="lista-tarjetas"></div>
      </div>
    </div>

    <div id="panel-eventos" class="panel">
      <div class="subseccion">
        <h3 class="subseccion-titulo">🎉 EVENTOS <button class="btn-add" onclick="crear('evento', 'eve-g')">+</button></h3>
        <div id="eve-g"></div>
      </div>
    </div>
  </div>
</main>

<button onclick="abrirLogin()" style="position:fixed; bottom:20px; right:20px; width:60px; height:60px; border-radius:50%; background:#00ff9f; border:4px solid #ff18d0; z-index:3000; font-size:25px">⚙️</button>

<div id="modal-login" class="overlay">
  <div class="modal-card">
    <h2 style="color:#00ff9f; margin-bottom:15px">ACCESO ADMIN</h2>
    <input type="password" id="pass-input" class="modal-input" placeholder="Contraseña">
    <button onclick="validarLogin()" style="width:100%; padding:15px; background:#00ff9f; border:none; border-radius:15px; font-weight:bold">ENTRAR</button>
    <button onclick="cerrarModal('modal-login')" style="color:white; margin-top:15px; background:none; border:none; cursor:pointer">Cerrar</button>
  </div>
</div>

<div id="modal-editor" class="overlay">
  <div class="modal-card">
    <img id="edImg" class="edit-img" src="" onclick="document.getElementById('fIn').click()">
    <div id="edInputs">
      <input type="text" id="edNom" class="modal-input" placeholder="Nombre">
      <input type="text" id="edPre" class="modal-input" placeholder="Precio">
    </div>
    <button onclick="saveEd()" style="width:100%; padding:15px; background:#00ff9f; border:none; border-radius:15px; font-weight:bold; margin-top:10px">GUARDAR</button>
    <button onclick="delEd()" style="width:100%; padding:15px; background:red; border:none; border-radius:15px; color:white; margin-top:10px">ELIMINAR</button>
    <button onclick="cerrarModal('modal-editor')" style="color:white; margin-top:15px; background:none; border:none">CANCELAR</button>
  </div>
</div>

<input type="file" id="fIn" style="display:none" accept="image/*">
<div id="saveIndicator">💾 Guardado</div>

<script>
  const CLAVE = "situs123";
  let objEd = null;
  let isAdmin = false;

  function tab(id, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('activo'));
    document.querySelectorAll('.pestana').forEach(p => p.classList.remove('activa'));
    document.getElementById('panel-'+id).classList.add('activo');
    el.classList.add('activa');
  }

  function abrirLogin() {
    document.getElementById('modal-login').style.display = "flex";
    document.getElementById('pass-input').focus();
  }

  function validarLogin() {
    if(document.getElementById('pass-input').value === CLAVE) {
      isAdmin = true;
      document.getElementById('kiosco-app').classList.add('admin-activo');
      cerrarModal('modal-login');
      alert("MODO EDICIÓN ACTIVADO");
      
      // Activar clics de edición
      document.body.onclick = (e) => {
        if(!isAdmin) return;
        let el = e.target.closest('.producto-card, .item-tarjeta, .evento-card');
        if(el) openEd(el);
      };
    } else {
      alert("Contraseña incorrecta");
    }
  }

  function crear(tipo, id) {
    if(!isAdmin) return;
    const c = document.getElementById(id);
    let h = '';
    if(tipo === 'evento') h = `<div class="evento-card"><img src="images/placeholder.jpg"></div>`;
    else if(tipo === 'lista-naranja') h = `<div class="item-tarjeta"><span class="item-nombre">NUEVO</span><span class="item-precio">0€</span></div>`;
    else if(tipo === 'lista-verde') h = `<div class="item-tarjeta verde"><span class="item-nombre">NUEVO</span><span class="item-precio">0€</span></div>`;
    else h = `<div class="producto-card"><img src="images/placeholder.jpg"><h4>NUEVO</h4><div class="producto-precio">0€</div></div>`;
    c.insertAdjacentHTML('beforeend', h);
    checkCols(); saveAll();
  }

  function openEd(el) {
    objEd = el;
    const isEve = el.classList.contains('evento-card');
    const isSinImg = el.classList.contains('item-tarjeta');
    document.getElementById('edInputs').style.display = isEve ? "none" : "block";
    document.getElementById('edImg').style.display = isSinImg ? "none" : "block";
    if(!isEve) {
      document.getElementById('edNom').value = el.querySelector('h4, .item-nombre').innerText;
      document.getElementById('edPre').value = el.querySelector('.producto-precio, .item-precio').innerText;
    }
    if(el.querySelector('img')) document.getElementById('edImg').src = el.querySelector('img').src;
    document.getElementById('modal-editor').style.display = "flex";
  }

  function saveEd() {
    if(!objEd.classList.contains('evento-card')) {
      objEd.querySelector('h4, .item-nombre').innerText = document.getElementById('edNom').value;
      objEd.querySelector('.producto-precio, .item-precio').innerText = document.getElementById('edPre').value;
    }
    if(objEd.querySelector('img')) objEd.querySelector('img').src = document.getElementById('edImg').src;
    saveAll(); cerrarModal('modal-editor');
  }

  function delEd() { if(confirm("¿Eliminar?")) { objEd.remove(); checkCols(); saveAll(); cerrarModal('modal-editor'); } }
  
  function cerrarModal(id) { 
    document.getElementById(id).style.display = "none";
    document.getElementById('pass-input').value = "";
  }

  document.getElementById('fIn').onchange = (e) => {
    const r = new FileReader();
    r.onload = (ev) => document.getElementById('edImg').src = ev.target.result;
    r.readAsDataURL(e.target.files[0]);
  };

  function checkCols() {
    ['beb-l', 'com-l', 'lia-g'].forEach(id => {
      const el = document.getElementById(id);
      if(el && el.children.length > 6) el.classList.add('doble-columna');
      else if(el) el.classList.remove('doble-columna');
    });
  }

  function saveAll() {
    localStorage.setItem('msh_v_final_ultra', document.getElementById('main-content').innerHTML);
    document.getElementById('saveIndicator').style.display="block"; 
    setTimeout(()=>document.getElementById('saveIndicator').style.display="none", 1000);
  }

  window.onload = () => {
    const saved = localStorage.getItem('msh_v_final_ultra');
    if(saved) {
      document.getElementById('main-content').innerHTML = saved;
      checkCols();
    }
  };
</script>
</body>
</html>
